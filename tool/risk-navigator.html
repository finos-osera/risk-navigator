  lines.push(`Qualification: ${assessment.remediation_type === "BACKPATCH" ? assessment.qualification : "CREATE_PATCH"}`);
  lines.push(`Exposure: ${lib.cve_count} CVEs (${lib.kev_cve_count || 0} KEV), ${lib.total_consumer_count} impacted projects (${lib.direct_consumer_count} direct / ${lib.transitive_consumer_count} transitive).`);
  lines.push(`Vulnerability edge impact (project x CVE): total=${assessment.edge_vulns_total}, direct=${assessment.edge_vulns_direct}, transitive=${assessment.edge_vulns_transitive}.`);
  lines.push(`Current release age note: ${assessment.current_release_age}. Latest observed release age note: ${assessment.latest_release_age}.`);
  lines.push("");
  lines.push("Context and constraints:");
  lines.push(`- ${assessment.rationale}`);
  considerations.forEach(c => lines.push(`- ${c}`));
  lines.push("");
  lines.push("Required output:");
  lines.push("1. Decide whether to proceed with backpatch/create-patch now, or prefer upgrade-first strategy.");
  lines.push("2. If backpatch/create-patch is recommended, provide implementation outline:");
  lines.push("   - patch branch strategy");
  lines.push("   - CVE-to-code mapping and fix source candidates");
  lines.push("   - test matrix and release validation gates");
  lines.push("3. If upgrade is recommended instead, explain why minor/major uplift is preferable despite migration overhead.");
  lines.push("4. Provide automation assets:");
  lines.push("   - OpenRewrite recipes to detect impacted usage patterns");
  lines.push("   - any codemods/scripts needed for compatibility changes");
  lines.push("5. Include a rollout plan and rollback criteria.");
  lines.push("");
  lines.push("Version chain context:");
  lines.push(summarizeVersionChain(lib, 18));
  lines.push("");
  lines.push("Impacted projects:");
  if (impactedRefs.length) {
    impactedRefs.forEach((ref, idx) => lines.push(`${idx + 1}. ${ref}`));
  } else {
    lines.push("- none in current filter");
  }
  lines.push("");
  lines.push("Return format:");
  lines.push("- Section A: Recommendation and rationale");
  lines.push("- Section B: Technical plan");
  lines.push("- Section C: OpenRewrite/codemod assets");
  lines.push("- Section D: Risk, testing, and rollout checklist");
  return toAscii(lines.join("\n"));
}

function computeFilteredLibraries() {
  const ds = state.dataset;
  const f = state.filters;
  const allLibraries = (ds.libraries || []);
  state.libraryProfiles = buildLibraryProfiles(allLibraries);
  const projectsById = new Map((ds.consumer_projects || []).map(p => [p.id, p]));

  let libs = allLibraries.filter(lib => {
    const profile = state.libraryProfiles.get(lib.id);
    if (lib.max_cvss < f.cvssMin) return false;
    if (!f.effort.has(lib.effort_class)) return false;
    if (f.namespace && lib.namespace !== f.namespace) return false;
    if (f.kevOnly && !lib.is_kev_listed) return false;
    if (f.directOnly && !(lib.direct_consumer_count > 0)) return false;
    if (f.transitiveOnly && !(lib.transitive_consumer_count > 0)) return false;
    if (f.backpatchOnly && !(profile && profile.is_backpatch_candidate)) return false;
    if (f.ageBucket && (!profile || profile.age_bucket !== f.ageBucket)) return false;
    if (f.minProjects > 0 && Number(lib.total_consumer_count || 0) < f.minProjects) return false;
    if (f.recommendedAction && (!profile || profile.recommended_action !== f.recommendedAction)) return false;
    if ((lib.epss_max || 0) < f.epssMin) return false;
    if (state.trancheFocus && lib.effort_class !== state.trancheFocus) return false;
    if (f.department) {
      const hasGroup = (lib.consumer_project_ids || []).some(pid => (state.projectGroups.get(pid) || "General") === f.department);
      if (!hasGroup) return false;
    }
    if (f.projectRefChips.length) {
      const hasProjectRef = (lib.consumer_project_ids || []).some(pid => {
        const p = projectsById.get(pid) || {};
        const names = new Set();
        const ref = String(p.project_ref || "").trim();
        if (ref) names.add(ref);
        const display = renderProjectRef(p);
        if (display) names.add(display);
        (Array.isArray(p.aliases) ? p.aliases : []).forEach(a => {
          const v = String(a || "").trim();
          if (v) names.add(v);
        });
        return f.projectRefChips.some(chip => names.has(chip));
      });
      if (!hasProjectRef) return false;
    }
    if (f.search) {
      const hay = `${lib.meta} ${lib.proj} ${lib.release} ${(lib.cves || []).map(c => c.cve_id).join(" ")}`.toLowerCase();
      if (!hay.includes(f.search.toLowerCase())) return false;
    }
    return true;
  });

  libs = sortRowsByState(libs);

  return libs;
}

function sortRowsByState(rows, valueResolver = null) {
  const arr = Array.isArray(rows) ? rows.slice() : [];
  if (!arr.length) return arr;
  const key = String(state.sort.key || "").trim();
  if (!key) return arr;
  const dir = state.sort.dir === "asc" ? 1 : -1;
  const getValue = typeof valueResolver === "function"
    ? (row => valueResolver(row, key))
    : (row => (row ? row[key] : undefined));
  const hasAny = arr.some(r => getValue(r) !== undefined && getValue(r) !== null);
  if (!hasAny) return arr;
  arr.sort((a, b) => {
    const av = getValue(a);
    const bv = getValue(b);
    if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
    return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
  });
  return arr;
}

function computeFrameworkRows(filteredLibraries) {
  const frameworkRules = state.frameworkRules || FRAMEWORKS;
  const groups = new Map();
  for (const rule of frameworkRules) {
    groups.set(rule.id, { id: rule.id, label: rule.label, libraries: [], consumers: new Set(), cves: 0, kev: 0, avgEffort: 0 });
  }
  for (const lib of filteredLibraries) {
    for (const rule of frameworkRules) {
      if (!rule.match(lib)) continue;
      const g = groups.get(rule.id);
      g.libraries.push(lib);
      lib.consumer_project_ids.forEach(id => g.consumers.add(id));
      g.cves += lib.cve_count;
      if (lib.is_kev_listed) g.kev += 1;
    }
  }
  const rows = [];
  for (const g of groups.values()) {
    if (!g.libraries.length) continue;
    const score = g.libraries.reduce((sum, l) => sum + l.risk_signal, 0);
    rows.push({
      id: g.id,
      label: g.label,
      library_count: g.libraries.length,
      consumer_count: g.consumers.size,
      cve_count: g.cves,
      kev_count: g.kev,
      risk_signal: score,
      libs: g.libraries
    });
  }
  return rows.sort((a,b) => b.risk_signal - a.risk_signal);
}

function computeAmplifierRows(filteredLibraries) {
  const visible = new Set(filteredLibraries.map(l => l.id));
  const rows = (state.dataset.amplifier_clusters || []).map(a => ({ ...a })).filter(a => a.amplified_libraries.some(id => visible.has(id)));
  rows.forEach(row => {
    row.visible_libraries = row.amplified_libraries.filter(id => visible.has(id));
    row.risk_signal = row.visible_libraries.reduce((sum, id) => {
      const lib = filteredLibraries.find(l => l.id === id);
      return sum + (lib ? lib.risk_signal : 0);
    }, 0);
  });
  rows.sort((a,b) => b.risk_signal - a.risk_signal || b.consumer_project_count_affected - a.consumer_project_count_affected);
  return rows;
}

function computeTopFixRows(filteredLibraries) {
  const rows = [];
  const effortWeight = { PATCH: 1, MINOR: 2, MAJOR: 4, DEAD_END: 6, UNKNOWN: 5, AMPLIFIER: 3, FRAMEWORK: 4 };
  const backpatchWeight = 2.8;

  for (const lib of filteredLibraries) {
    const assessment = buildBackpatchAssessment(lib);
    const type = lib.effort_class === "DEAD_END" ? (assessment.remediation_action || backpatchActionType(lib)) : `UPGRADE_${lib.effort_class}`;
    const weight = effortWeight[lib.effort_class] || 5;
    const score = (lib.total_consumer_count * (1 + lib.cve_count / 10) / weight) * (lib.is_kev_listed ? 3 : 1) * (1 + (lib.epss_max || 0));
    rows.push({
      id: `lib:${lib.id}`,
      action_type: type,
      target: `${lib.meta}:${lib.proj}`,
      projects: lib.total_consumer_count,
      cves_cleared: lib.cve_count,
      libs_cleared: 1,
      effort: lib.effort_class,
      backpatch_qualification: type.startsWith("BACKPATCH_") ? type.replace("BACKPATCH_", "") : "",
      score,
      assessment,
      detail: lib
    });

    // BACKPATCH opportunity as an alternative when upgrade requires
    // MINOR/MAJOR coordination.
    if (["MINOR", "MAJOR"].includes(lib.effort_class) && assessment.remediation_type === "BACKPATCH") {
      const complexityBoost = lib.effort_class === "MAJOR" ? 2.0 : lib.effort_class === "MINOR" ? 1.4 : 1.2;
      const backpatchScore =
        (lib.total_consumer_count * (1 + lib.cve_count / 10) / backpatchWeight) *
        (lib.is_kev_listed ? 3 : 1) *
        (1 + (lib.epss_max || 0)) *
        complexityBoost;

      rows.push({
        id: `bp:${lib.id}`,
        action_type: backpatchActionType(lib),
        target: `${lib.meta}:${lib.proj} (backpatch line ${lib.release})`,
        projects: lib.total_consumer_count,
        cves_cleared: lib.cve_count,
        libs_cleared: 1,
        effort: "BACKPATCH",
        backpatch_qualification: assessment.qualification,
        assessment,
        score: backpatchScore,
        detail: lib
      });
    }
  }

  const ampRows = computeAmplifierRows(filteredLibraries).slice(0, 30);
  for (const amp of ampRows) {
    const cves = amp.visible_libraries.reduce((sum, id) => {
      const lib = filteredLibraries.find(l => l.id === id);
      return sum + (lib ? lib.cve_count : 0);
    }, 0);
    const epssMax = amp.visible_libraries.reduce((m, id) => {
      const lib = filteredLibraries.find(l => l.id === id);
      return Math.max(m, Number((lib && lib.epss_max) || 0));
    }, 0);
    const kev = amp.visible_libraries.some(id => (filteredLibraries.find(l => l.id === id) || {}).is_kev_listed);
    const score = (amp.consumer_project_count_affected * (1 + cves / 10) / effortWeight.AMPLIFIER) * (kev ? 3 : 1) * (1 + epssMax);
    rows.push({
      id: `amp:${amp.amplifier_id}`,
      action_type: "AMPLIFIER",
      target: amp.amplifier_label,
      projects: amp.consumer_project_count_affected,
      cves_cleared: cves,
      libs_cleared: amp.visible_libraries.length,
      effort: "AMPLIFIER",
      score,
      detail: amp
    });
  }

  const fwRows = computeFrameworkRows(filteredLibraries);
  for (const fw of fwRows) {
    const epssMax = (fw.libs || []).reduce((m, l) => Math.max(m, Number((l && l.epss_max) || 0)), 0);
    const kev = fw.libs.some(l => l.is_kev_listed);
    const score = (fw.consumer_count * (1 + fw.cve_count / 10) / effortWeight.FRAMEWORK) * (kev ? 3 : 1) * (1 + epssMax);
    rows.push({
      id: `fw:${fw.id}`,
      action_type: "FRAMEWORK",
      target: fw.label,
      projects: fw.consumer_count,
      cves_cleared: fw.cve_count,
      libs_cleared: fw.library_count,
      effort: "FRAMEWORK",
      score,
      detail: fw
    });
  }

  rows.sort((a,b) => b.score - a.score);
  return rows;
}

function computeBackpatchLandscapeRows(filteredLibraries) {
  const rows = [];
  for (const lib of filteredLibraries) {
    const assessment = buildBackpatchAssessment(lib);
    if (!["BACKPATCH", "CREATE_PATCH"].includes(assessment.remediation_type)) continue;
    const actionType = assessment.remediation_action || "BACKPATCH";
    const base = (lib.total_consumer_count * (1 + lib.cve_count / 10)) * (lib.is_kev_listed ? 3 : 1) * (1 + (lib.epss_max || 0));
    const lift = actionType === "CREATE_PATCH" ? 1.05 : (assessment.qualification === "PROBABLE" ? 1.35 : 1.2);
    rows.push({
      id: `bpv:${lib.id}`,
      action_type: actionType,
      qualification: assessment.qualification,
      namespace: lib.namespace,
      meta: lib.meta,
      proj: lib.proj,
      release: lib.release,
      nearest_safe_version: lib.nearest_safe_version || "-",
      direct_projects: lib.direct_consumer_count || 0,
      transitive_projects: lib.transitive_consumer_count || 0,
      total_projects: lib.total_consumer_count || 0,
      cve_count: lib.cve_count || 0,
      kev_cve_count: lib.kev_cve_count || 0,
      edge_vulns_direct: assessment.edge_vulns_direct,
      edge_vulns_transitive: assessment.edge_vulns_transitive,
      edge_vulns_total: assessment.edge_vulns_total,
      latest_release: assessment.latest_release,
      latest_vulnerable: assessment.latest_vulnerable,
      release_age_note: assessment.current_release_age,
      latest_release_age_note: assessment.latest_release_age,
      rationale: assessment.rationale,
      assessment,
      score: base * lift,
      detail: lib
    });
  }
  rows.sort((a, b) => b.score - a.score || b.edge_vulns_total - a.edge_vulns_total);
  return rows;
}

function computeProjectRows(filteredLibraries) {
  const visibleLibs = new Set(filteredLibraries.map(l => l.id));
  const f = activeFilters();
  const projects = (state.dataset.consumer_projects || []).map(p => ({ ...p }));
  projects.forEach(p => {
    p.project_group = state.projectGroups.get(p.id) || "General";
    if (f.department && p.project_group !== f.department) {
      p.visible_libraries = [];
      p.visible_count = 0;
      p.visible_max_cvss = 0;
      p.visible_kev = 0;
      return;
    }
    p.visible_libraries = (p.vulnerable_library_ids || []).filter(id => visibleLibs.has(id));
    p.visible_count = p.visible_libraries.length;
    p.visible_max_cvss = p.visible_libraries.reduce((m, id) => {
      const lib = filteredLibraries.find(l => l.id === id);
      return Math.max(m, Number((lib && lib.max_cvss) || 0));
    }, 0);
    p.visible_kev = p.visible_libraries.filter(id => (filteredLibraries.find(l => l.id === id) || {}).is_kev_listed).length;
  });
  const filtered = projects.filter(p => p.visible_count > 0);
  filtered.sort((a,b) => b.visible_count - a.visible_count || b.visible_max_cvss - a.visible_max_cvss);
  return filtered;
}

function cveDateString(cve) {
  if (!cve || typeof cve !== "object") return "";
  const keys = ["date_reported", "reported_at", "published_at", "published", "date", "discovered_at"];
  for (const k of keys) {
    if (cve[k]) return String(cve[k]);
  }
  return "";
}

function cveModifiedDateString(cve) {
  if (!cve || typeof cve !== "object") return "";
  const keys = ["modified", "updated", "last_modified", "date_updated"];
  for (const k of keys) {
    if (cve[k]) return String(cve[k]);
  }
  return "";
}

function cveSummaryText(cve) {
  if (!cve || typeof cve !== "object") return "";
  const keys = ["summary", "title", "description", "details"];
  for (const k of keys) {
    if (cve[k]) return String(cve[k]).trim();
  }
  return "";
}

function cveDescriptionText(cve) {
  if (!cve || typeof cve !== "object") return "";
  const keys = ["description", "details", "summary", "title"];
  for (const k of keys) {
    if (cve[k]) return String(cve[k]).trim();

  return "";
}

function formatDateDisplay(dateStr) {
  const raw = String(dateStr || "").trim();
  if (!raw) return "";
  const dt = new Date(raw);
  if (Number.isNaN(dt.getTime())) return raw;
  return dt.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });
}

function formatDateTimeDisplay(dateStr) {
  const raw = String(dateStr || "").trim();
  if (!raw) return "";
  const dt = new Date(raw);
  if (Number.isNaN(dt.getTime())) return raw;
  return dt.toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function computeCveRows(filteredLibraries) {
  const minCvss = Number(state.filters.cvssMin || 0);
  const minEpss = Number(state.filters.epssMin || 0);
  const byId = new Map();
  filteredLibraries.forEach(lib => {
    (lib.cves || []).forEach(cve => {
      const id = String(cve.cve_id || "").trim();
      if (!id) return;
      const cveCvss = Number(cve.cvss || 0);
      const cveEpss = Number(cve.epss || 0);
      if (cveCvss < minCvss) return;
      if (cveEpss < minEpss) return;
      if (!byId.has(id)) {
        byId.set(id, {
          id: `cve:${id}`,
          cve_id: id,
          max_cvss: cveCvss,
          max_epss: cveEpss,
          kev: !!cve.kev,
          reported_date: cveDateString(cve),
          modified_date: cveModifiedDateString(cve),
          cve_source: String(cve.cve_source || cve.source || "").trim(),
          summary: cveSummaryText(cve),
          description: cveDescriptionText(cve),
          lib_ids: new Set(),
          library_rows: [],
          direct_project_ids: new Set(),
          transitive_project_ids: new Set(),
          project_ids: new Set(),
          direct_exposure_hits: 0,
          transitive_exposure_hits: 0
        });
      }
      const row = byId.get(id);
      row.max_cvss = Math.max(row.max_cvss, cveCvss);
      row.max_epss = Math.max(row.max_epss, cveEpss);
      row.kev = row.kev || !!cve.kev;
      if (!row.reported_date) row.reported_date = cveDateString(cve);
      if (!row.modified_date) row.modified_date = cveModifiedDateString(cve);
      if (!row.cve_source) row.cve_source = String(cve.cve_source || cve.source || "").trim();
      if (!row.summary) row.summary = cveSummaryText(cve);
      if (!row.description) row.description = cveDescriptionText(cve);
      if (!row.lib_ids.has(lib.id)) {
        row.lib_ids.add(lib.id);
        row.library_rows.push({
          lib_id: lib.id,
          namespace: lib.namespace,
          meta: lib.meta,
          proj: lib.proj,
          release: lib.release,
          direct_projects: Number(lib.direct_consumer_count || 0),
          transitive_projects: Number(lib.transitive_consumer_count || 0),
          total_projects: Number(lib.total_consumer_count || 0)
        });
      }
      const directIds = new Set(lib.direct_consumer_project_ids || []);
      const allIds = new Set(lib.consumer_project_ids || []);
      directIds.forEach(pid => row.direct_project_ids.add(pid));
      allIds.forEach(pid => {
        row.project_ids.add(pid);
        if (!directIds.has(pid)) row.transitive_project_ids.add(pid);
      });
      row.direct_exposure_hits += Number(lib.direct_consumer_count || 0);
      row.transitive_exposure_hits += Number(lib.transitive_consumer_count || 0);
    });
  });

  const rows = [...byId.values()].map(r => {
    const libs = r.library_rows.slice().sort((a, b) =>
      b.total_projects - a.total_projects || b.direct_projects - a.direct_projects || String(a.proj || "").localeCompare(String(b.proj || ""))
    );
    return {
      id: r.id,
      cve_id: r.cve_id,
      max_cvss: r.max_cvss,
      max_epss: r.max_epss,
      kev: r.kev,
      reported_date: r.reported_date,
      reported_date_label: formatDateDisplay(r.reported_date) || "",
      modified_date: r.modified_date,
      modified_date_label: formatDateDisplay(r.modified_date) || "",
      cve_source: r.cve_source || "",
      summary: r.summary,
      description: r.description,
      lib_hits: r.lib_ids.size,
      project_hits: r.project_ids.size,
      direct_project_hits: r.direct_project_ids.size,
      transitive_project_hits: r.transitive_project_ids.size,
      project_ids: [...r.project_ids],
      direct_project_ids: [...r.direct_project_ids],
      transitive_project_ids: [...r.transitive_project_ids],
      direct_exposure_hits: r.direct_exposure_hits,
      transitive_exposure_hits: r.transitive_exposure_hits,
      library_rows: libs
    };
  });

  rows.sort((a, b) =>
    Number(b.kev) - Number(a.kev) ||
    b.max_cvss - a.max_cvss ||
    b.project_hits - a.project_hits ||
    b.lib_hits - a.lib_hits
  );
  return rows;
}

function projectStrategyLabel(plan) {
  if (!plan) return "STANDARD_UPGRADE";
  if (plan.blocked_pending_alliance_patch > 0) return "BLOCKED_PENDING_ALLIANCE_PATCH";
  if ((plan.major_equivalent_count || plan.major_count || 0) > 0 && plan.avoidable_major_migrations > 0) return "MAJOR_MIGRATION_OR_BACKPATCH";
  if (plan.alliance_patch_count > 0 && plan.amplifier_patch_count > 0) return "AMPLIFIER_PATCH_CONSUMER";
  if (plan.alliance_patch_count > 0 && plan.dead_end_count > 0) return "BACKPATCH_CONSUMER";
  if (plan.dead_end_count > 1 || plan.major_count > 3) return "HIGH_RISK_LEGACY";
  if ((plan.major_equivalent_count || plan.major_count || 0) > 0) return "MAJOR_MIGRATION_REQUIRED";
  if (plan.minor_count >= 3) return "MINOR_COORDINATED_UPGRADE";
  if (plan.bom_override_count > 0) return "TEMPORARY_OVERRIDE_REQUIRED";
  return "STANDARD_UPGRADE";
}

function projectStrategyExplanation(strategy) {
  const map = {
    STANDARD_UPGRADE: "Most exposure can be remediated through routine patch/minor upgrades.",
    MINOR_COORDINATED_UPGRADE: "Multiple minor upgrades should be coordinated as one planning wave.",
    MAJOR_MIGRATION_REQUIRED: "At least one remediation path requires major migration planning.",
    MAJOR_MIGRATION_OR_BACKPATCH: "Major migration items exist, but backpatch/backport options can likely defer some of those migrations.",
    BACKPATCH_CONSUMER: "Project depends on OSERA-created backpatch/fork deliverables.",
    AMPLIFIER_PATCH_CONSUMER: "Project likely benefits most from patched amplifier/direct dependency adoption.",
    HIGH_RISK_LEGACY: "Legacy profile with repeated dead-end/major remediations and higher residual risk.",
    TEMPORARY_OVERRIDE_REQUIRED: "Interim BOM/managed-version overrides are likely needed while fixes are prepared.",
    BLOCKED_PENDING_ALLIANCE_PATCH: "Remediation is blocked until OSERA patch artifacts are produced."
  };
  return map[strategy] || "Needs analyst review.";
}

function strategyVisualMeta(strategy) {
  const s = String(strategy || "").trim();
  const map = {
    STANDARD_UPGRADE: { short: "UPG", glyph: "↑", tone: "tone-upgrade", tooltip: "STANDARD_UPGRADE: Routine patch/minor upgrade path." },
    MINOR_COORDINATED_UPGRADE: { short: "MINOR", glyph: "↗", tone: "tone-minor", tooltip: "MINOR_COORDINATED_UPGRADE: Multiple minor upgrades should be coordinated as one wave." },
    MAJOR_MIGRATION_REQUIRED: { short: "MAJOR", glyph: "⇧", tone: "tone-major", tooltip: "MAJOR_MIGRATION_REQUIRED: At least one dependency requires a major migration plan." },
    MAJOR_MIGRATION_OR_BACKPATCH: { short: "OSERA/MAJ", bpa: true, tone: "tone-bpa", tooltip: "MAJOR_MIGRATION_OR_BACKPATCH: Major migration exists, but OSERA backpatch may defer it." },
    BACKPATCH_CONSUMER: { short: "OSERA", bpa: true, tone: "tone-bpa", tooltip: "BACKPATCH_CONSUMER: Project depends on OSERA-created/maintained backpatch artifacts." },
    AMPLIFIER_PATCH_CONSUMER: { short: "OSERA+AMP", bpa: true, tone: "tone-bpa", tooltip: "AMPLIFIER_PATCH_CONSUMER: Project depends on OSERA patching of an amplifier/direct dependency." },
    HIGH_RISK_LEGACY: { short: "LEGACY", glyph: "!", tone: "tone-risk", tooltip: "HIGH_RISK_LEGACY: Legacy profile with repeated DEAD_END/MAJOR remediation." },
    TEMPORARY_OVERRIDE_REQUIRED: { short: "OVRD", glyph: "≡", tone: "tone-neutral", tooltip: "TEMPORARY_OVERRIDE_REQUIRED: Temporary managed-version override likely needed." },
    BLOCKED_PENDING_ALLIANCE_PATCH: { short: "OSERA BLOCK", bpa: true, tone: "tone-bpa", tooltip: "BLOCKED_PENDING_ALLIANCE_PATCH: Remediation blocked until OSERA patch is delivered." }
  };
  return map[s] || { short: s || "UNKNOWN", glyph: "•", tone: "tone-neutral", tooltip: `${s || "UNKNOWN"}: Needs analyst review.` };
}

function renderStrategyPill(strategy) {
  const meta = strategyVisualMeta(strategy);
  const tip = escapeHtml(meta.tooltip || String(strategy || ""));
  const icon = meta.bpa
    ? `<img class="strategy-logo" src="${FINOS_ICON_URL}" alt="FINOS/OSERA icon" loading="lazy" decoding="async">`
    : `<span class="strategy-glyph" aria-hidden="true">${escapeHtml(meta.glyph || "•")}</span>`;
  return `<span class="strategy-pill ${meta.tone || "tone-neutral"}" title="${tip}" aria-label="${tip}">${icon}<span>${escapeHtml(meta.short || String(strategy || ""))}</span></span>`;
}

function renderAlliancePatchIndicator(profile) {
  if (!profile || !profile.alliance_patch_required) return `<span class="small" title="No OSERA-created patch requirement detected for this row.">-</span>`;
  const tip = escapeHtml(profile.alliance_patch_reason || "OSERA-created/maintained patch recommended.");
  return `<span class="badge kev" title="${tip}" aria-label="${tip}">OSERA PATCH</span>`;
}

function isAvoidableMajorByBackpatch(lib, profile) {
  if (!lib || !profile) return false;
  if (String(lib.effort_class || "") !== "MAJOR") return false;
  const action = String(profile.recommended_action || "");
  return ["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY", "CREATE_BOM_OVERRIDE"].includes(action);
}

function majorJumpRequired(currentRelease, safeRelease) {
  const cur = parseMajorMinor(currentRelease);
  const safe = parseMajorMinor(safeRelease);
  if (!cur || !safe) return false;
  return Number(safe.major) > Number(cur.major);
}

function avoidableMajorViaPatch(lib, profile, action) {
  if (!lib || !profile) return false;
  const a = String(action || "");
  if (!["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY", "CREATE_BOM_OVERRIDE"].includes(a)) return false;
  if (String(lib.effort_class || "") === "MAJOR") return true;
  if (majorJumpRequired(lib.release, lib.nearest_safe_version)) return true;
  const safeKind = String((profile.assessment && profile.assessment.safe_path_kind) || "");
  return safeKind === "major-only";
}

function remediationPriorityLabel(lib, entry) {
  if (!lib || !entry) return "PLANNED";
  if (Number(lib.kev_cve_count || 0) > 0) return "IMMEDIATE";
  if (Number(lib.max_cvss || 0) >= 9) return "IMMEDIATE";
  if (String(lib.effort_class || "") === "DEAD_END") return "NEAR_TERM";
  if (String(lib.effort_class || "") === "MAJOR") return "NEAR_TERM";
  if (Number(lib.max_cvss || 0) >= 7) return "NEAR_TERM";
  return "PLANNED";
}

function remediationPriorityWeight(label) {
  if (label === "IMMEDIATE") return 3;
  if (label === "NEAR_TERM") return 2;
  if (label === "PLANNED") return 1;
  return 0;
}

function remediationActionWeight(action) {
  if (action === "CREATE_LIBRARY_FORK") return 1;
  if (action === "PATCH_EXISTING_FORK") return 1;
  if (action === "PATCH_AMPLIFIER_LIBRARY") return 2;
  if (action === "CREATE_BOM_OVERRIDE") return 3;
  if (action === "PUBLISH_UPGRADE_GUIDANCE") return 4;
  if (action === "WAIT_FOR_UPSTREAM") return 5;
  if (action === "MONITOR_ONLY") return 6;
  if (action === "EXCLUDE_LOW_RUNTIME_RISK") return 7;
  return 8;
}

function remediationReason(entry) {
  if (!entry) return "Needs analyst review.";
  const bits = [];
  if (entry.kev_count > 0) bits.push(`${entry.kev_count} KEV`);
  if (entry.cvss >= 9) bits.push(`CVSS ${fmt(entry.cvss, 1)}`);
  if (entry.effort === "DEAD_END") bits.push("no low-friction safe path");
  else if (entry.effort === "MAJOR") bits.push("major migration path");
  else if (entry.effort === "MINOR") bits.push("minor compatibility review needed");
  if (entry.kind === "TRA") bits.push("transitive dependency");
  if (entry.action === "PATCH_AMPLIFIER_LIBRARY" && entry.amplifier_library && entry.amplifier_library !== "-") {
    bits.push(`prefer amplifier patch (${entry.amplifier_library})`);
  }
  return bits.length ? bits.join(" | ") : "routine remediation path";
}

function remediationAllianceStory(entry) {
  if (!entry) return "Needs analyst review.";
  if (entry.action === "PATCH_AMPLIFIER_LIBRARY") {
    return `Patch amplifier path ${entry.patch_target || "-"} to reduce repeated transitive overrides and provide a safer direct upgrade path.`;
  }
  if (entry.action === "CREATE_LIBRARY_FORK") {
    if (entry.effort === "DEAD_END") {
      return `Create maintained backpatch on current line ${versionLineFamily(entry.release)} because no low-friction safe path is visible in scope.`;
    }
    return `Create OSERA-maintained patch/fork on ${versionLineFamily(entry.release)} to reduce migration pressure and exposure.`;
  }
  if (entry.action === "PATCH_EXISTING_FORK") {
    return `Refresh/maintain existing backpatch line ${versionLineFamily(entry.release)} with current security fixes.`;
  }
  return "No OSERA patch creation required for this item.";
}

function computeProjectRemediationRows(filteredLibraries) {
  const visibleLibs = new Set(filteredLibraries.map(l => l.id));
  const librariesById = new Map(filteredLibraries.map(l => [l.id, l]));
  const f = activeFilters();
  const rows = [];
  const maxLibs = (state.dataset.consumer_projects || [])
    .reduce((m, p) => Math.max(m, Number(p.vulnerable_library_count || 0)), 1);

  (state.dataset.consumer_projects || []).forEach(project => {
    const projectGroup = state.projectGroups.get(project.id) || "General";
    if (f.department && projectGroup !== f.department) return;
    const visible = (project.vulnerable_library_ids || []).filter(id => visibleLibs.has(id));
    if (!visible.length) return;
    let patchCount = 0;
    let minorCount = 0;
    let majorCount = 0;
    let deadEndCount = 0;
    let unknownCount = 0;
    let kevCount = 0;
    let maxCvss = 0;
    let alliancePatchCount = 0;
    let amplifierPatchCount = 0;
    let bomOverrideCount = 0;
    let publishGuidanceCount = 0;
    let blockedPendingAlliancePatch = 0;
    let roiSum = 0;
    let ageMaxMonths = 0;
    let totalCveExposure = 0;
    const uniqueCves = new Set();
    let minorTransitiveReviewCount = 0;
    let majorBackpatchReviewCount = 0;
    let majorEquivalentCount = 0;
    let avoidableMajorMigrations = 0;
    let avoidableMajorByAlliancePatch = 0;
    let avoidableMajorByOverride = 0;
    const majorAvoidanceCandidates = [];
    const remediationEntries = [];
    const actionCounts = new Map();
    const priorityCounts = { IMMEDIATE: 0, NEAR_TERM: 0, PLANNED: 0 };

    visible.forEach(id => {
      const lib = librariesById.get(id);
      const profile = state.libraryProfiles.get(id);
      if (!lib || !profile) return;
      const eff = String(lib.effort_class || "UNKNOWN");
      if (eff === "PATCH") patchCount += 1;
      else if (eff === "MINOR") minorCount += 1;
      else if (eff === "MAJOR") majorCount += 1;
      else if (eff === "DEAD_END") deadEndCount += 1;
      else unknownCount += 1;
      if (Number(lib.kev_cve_count || 0) > 0) kevCount += 1;
      maxCvss = Math.max(maxCvss, Number(lib.max_cvss || 0));
      totalCveExposure += Number(lib.cve_count || 0);
      (lib.cves || []).forEach(c => { if (c && c.cve_id) uniqueCves.add(c.cve_id); });
      roiSum += Number(profile.patch_roi || 0);
      ageMaxMonths = Math.max(ageMaxMonths, Number(profile.assessment.current_release_age_months || 0));
      const isDirectForProject = !!(lib.direct_consumer_project_ids || []).includes(project.id);
      if (eff === "MINOR" && !isDirectForProject) minorTransitiveReviewCount += 1;
      if (eff === "MAJOR") majorBackpatchReviewCount += 1;
      if (eff === "MAJOR") majorEquivalentCount += 1;
      const action = String(profile.recommended_action || "PUBLISH_UPGRADE_GUIDANCE");
      const depKind = isDirectForProject ? "DIR" : "TRA";
      const latestMinor = profile.assessment && profile.assessment.latest_same_minor ? profile.assessment.latest_same_minor.release : "";
      const patchLine = latestMinor || lib.release || "-";
      const amplifierRef = profile.amplifier_library || "-";
      const targetType = action === "PATCH_AMPLIFIER_LIBRARY" ? "AMPLIFIER" : "LIBRARY_LINE";
      const priority = remediationPriorityLabel(lib, profile);
      const entry = {
        library_id: lib.id,
        namespace: lib.namespace,
        meta: lib.meta,
        proj: lib.proj,
        release: lib.release || "-",
        nearest_safe_version: lib.nearest_safe_version || "-",
        latest_version: profile.latest_version || "-",
        effort: eff,
        kind: depKind,
        cvss: Number(lib.max_cvss || 0),
        kev_count: Number(lib.kev_cve_count || 0),
        cve_count: Number(lib.cve_count || 0),
        epss_max: Number(lib.epss_max || 0),
        action,
        action_explanation: profile.recommended_action_explanation || "Needs analyst review.",
        priority,
        priority_weight: remediationPriorityWeight(priority),
        action_weight: remediationActionWeight(action),
        patch_candidate_score: Number(profile.patch_candidate_score || 0),
        is_backpatch_candidate: !!profile.is_backpatch_candidate,
        amplifier_library: amplifierRef,
        patch_target_type: targetType,
        patch_target: targetType === "AMPLIFIER" ? amplifierRef : patchLine,
        rationale: remediationReason({
          kev_count: Number(lib.kev_cve_count || 0),
          cvss: Number(lib.max_cvss || 0),
          effort: eff,
          kind: depKind,
          action,
          amplifier_library: amplifierRef
        }),
        avoided_major_possible: avoidableMajorViaPatch(lib, profile, action),
        consumers_portfolio_total: Number(lib.total_consumer_count || 0),
        consumers_portfolio_direct: Number(lib.direct_consumer_count || 0),
        consumers_portfolio_transitive: Number(lib.transitive_consumer_count || 0)
      };
      remediationEntries.push(entry);
      actionCounts.set(action, (actionCounts.get(action) || 0) + 1);
      priorityCounts[priority] = (priorityCounts[priority] || 0) + 1;

      if (entry.avoided_major_possible) {
        if (eff !== "MAJOR") majorEquivalentCount += 1;
        avoidableMajorMigrations += 1;
        const lineFamily = versionLineFamily(patchLine);
        const alliancePatchRequired = isAlliancePatchAction(entry.action);
        if (alliancePatchRequired) avoidableMajorByAlliancePatch += 1;
        else avoidableMajorByOverride += 1;
        const avoidanceStory = alliancePatchRequired
          ? (entry.patch_target_type === "AMPLIFIER"
            ? `Create/maintain OSERA patch on amplifier ${amplifierRef} so this project can adopt a patched direct dependency instead of immediate major migration to ${entry.nearest_safe_version}.`
            : `Create/maintain OSERA backpatch for ${lib.meta}/${lib.proj} on ${lineFamily}; consuming the patched ${lineFamily} line can defer major migration to ${entry.nearest_safe_version}.`)
          : `Use controlled override path to defer immediate major migration to ${entry.nearest_safe_version} while durable patch/migration work is prepared.`;
        majorAvoidanceCandidates.push({
          library_id: lib.id,
          namespace: lib.namespace,
          meta: lib.meta,
          proj: lib.proj,
          release: lib.release,
          nearest_safe_version: lib.nearest_safe_version || "-",
          action: entry.action,
          target_type: entry.patch_target_type,
          patch_line: patchLine,
          patch_line_family: lineFamily,
          amplifier_ref: amplifierRef,
          transitive_only: depKind === "TRA",
          rationale: entry.rationale,
          alliance_patch_required: alliancePatchRequired,
          avoidance_story: avoidanceStory,
          cve_count: Number(lib.cve_count || 0),
          kev_count: Number(lib.kev_cve_count || 0),
          portfolio_projects_benefit: Number(lib.total_consumer_count || 0)
        });
      }
      if (entry.action === "CREATE_LIBRARY_FORK" || entry.action === "PATCH_EXISTING_FORK") {
        alliancePatchCount += 1;
      }
      if (entry.action === "PATCH_AMPLIFIER_LIBRARY") {
        amplifierPatchCount += 1;
      }
      if (entry.action === "CREATE_BOM_OVERRIDE") {
        bomOverrideCount += 1;
      }
      if (entry.action === "PUBLISH_UPGRADE_GUIDANCE") {
        publishGuidanceCount += 1;
      }
      if (["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY"].includes(entry.action)) {
        blockedPendingAlliancePatch += 1;
      }
    });

    remediationEntries.sort((a, b) =>
      b.priority_weight - a.priority_weight ||
      a.action_weight - b.action_weight ||
      b.cvss - a.cvss ||
      b.patch_candidate_score - a.patch_candidate_score ||
      a.meta.localeCompare(b.meta) ||
      a.proj.localeCompare(b.proj)
    );
    majorAvoidanceCandidates.sort((a, b) =>
      Number(b.alliance_patch_required) - Number(a.alliance_patch_required) ||
      Number(b.kev_count || 0) - Number(a.kev_count || 0) ||
      Number(b.cve_count || 0) - Number(a.cve_count || 0) ||
      String(a.meta || "").localeCompare(String(b.meta || "")) ||
      String(a.proj || "").localeCompare(String(b.proj || ""))
    );

    const total = visible.length;
    const maxCvssN = clamp01(maxCvss / 10);
    const kevN = clamp01(kevCount > 0 ? 1 : 0);
    const deadEndN = clamp01(deadEndCount / Math.max(1, total));
    const majorN = clamp01(majorCount / Math.max(1, total));
    const infrastructureSensitivity = 0.5; // needs source metadata
    const centralityN = clamp01(total / maxLibs);
    const backlogAgeN = clamp01(ageMaxMonths / 60);
    const projectPriorityScore = (
      maxCvssN * 0.25 +
      kevN * 0.20 +
      deadEndN * 0.15 +
      majorN * 0.15 +
      infrastructureSensitivity * 0.10 +
      centralityN * 0.10 +
      backlogAgeN * 0.05
    ) * 100;

    const basePlan = {
      patch_count: patchCount,
      minor_count: minorCount,
      major_count: majorCount,
      dead_end_count: deadEndCount,
      unknown_count: unknownCount,
      required_standard_upgrades: patchCount + minorCount + majorCount,
      alliance_patch_count: alliancePatchCount,
      amplifier_patch_count: amplifierPatchCount,
      bom_override_count: bomOverrideCount,
      publish_guidance_count: publishGuidanceCount,
      blocked_pending_alliance_patch: blockedPendingAlliancePatch,
      estimated_actions: patchCount + minorCount + majorCount + alliancePatchCount + amplifierPatchCount + bomOverrideCount,
      roi_sum: Math.round(roiSum * 100) / 100,
      total_cve_exposure: totalCveExposure,
      unique_cve_count: uniqueCves.size,
      minor_transitive_review_count: minorTransitiveReviewCount,
      major_backpatch_review_count: majorBackpatchReviewCount,
      major_equivalent_count: majorEquivalentCount,
      avoidable_major_migrations: avoidableMajorMigrations,
      avoidable_major_by_alliance_patch: avoidableMajorByAlliancePatch,
      avoidable_major_by_override: avoidableMajorByOverride,
      residual_major_migrations: Math.max(0, majorEquivalentCount - avoidableMajorMigrations),
      major_avoidance_patch_work_items: Array.from(new Set(majorAvoidanceCandidates.map(c => `${c.target_type}|${c.action}|${c.target_type === "AMPLIFIER" ? c.amplifier_ref : `${c.namespace}|${c.meta}|${c.proj}|${c.patch_line}`}`))).length,
      major_avoidance_candidates: majorAvoidanceCandidates,
      remediation_entries: remediationEntries,
      remediation_action_counts: Object.fromEntries(actionCounts.entries()),
      remediation_priority_counts: priorityCounts,
      immediate_action_count: priorityCounts.IMMEDIATE || 0,
      near_term_action_count: priorityCounts.NEAR_TERM || 0,
      planned_action_count: priorityCounts.PLANNED || 0
    };
    const strategy = projectStrategyLabel(basePlan);
    rows.push({
      ...project,
      project_group: projectGroup,
      visible_libraries: visible,
      visible_count: total,
      visible_max_cvss: maxCvss,
      kev_lib_count: kevCount,
      project_priority_score: Math.round(projectPriorityScore * 10) / 10,
      strategy,
      strategy_explanation: projectStrategyExplanation(strategy),
      ...basePlan
    });
  });

  rows.sort((a, b) => b.project_priority_score - a.project_priority_score || b.visible_count - a.visible_count);
  state.projectPlanProfiles = new Map(rows.map(r => [r.id, r]));
  return rows;
}

function computeProjectGroupRollups(projectRows) {
  const byGroup = new Map();
  projectRows.forEach(p => {
    const g = p.project_group || "General";
    if (!byGroup.has(g)) {
      byGroup.set(g, {
        group: g,
        projects: 0,
        total_risk: 0,
        vulnerable_libraries: 0,
        patch: 0,
        minor: 0,
        major: 0,
        dead_end: 0,
        alliance_patches: 0,
        top_project: "",
        top_project_score: 0,
        roi_sum: 0
      });
    }
    const row = byGroup.get(g);
    row.projects += 1;
    row.total_risk += Number(p.project_priority_score || 0);
    row.vulnerable_libraries += Number(p.visible_count || 0);
    row.patch += Number(p.patch_count || 0);
    row.minor += Number(p.minor_count || 0);
    row.major += Number(p.major_count || 0);
    row.dead_end += Number(p.dead_end_count || 0);
    row.alliance_patches += Number(p.alliance_patch_count || 0) + Number(p.amplifier_patch_count || 0);
    row.roi_sum += Number(p.roi_sum || 0);
    if (Number(p.project_priority_score || 0) > row.top_project_score) {
      row.top_project = renderProjectRef(p);
      row.top_project_score = Number(p.project_priority_score || 0);
    }
  });
  return [...byGroup.values()].sort((a, b) => b.total_risk - a.total_risk);
}

function simulatePatchLib(lib) {
  const effortRank = { PATCH: 1, MINOR: 2, MAJOR: 3, DEAD_END: 4, UNKNOWN: 2 };
  const baseline = String(lib.effort_class || "UNKNOWN");
  const needsBiggerUpgrade = baseline !== "PATCH";
  const kevCount = Number(lib.kev_cve_count || (lib.cves || []).filter(c => c.kev).length || 0);
  const biggestJumpAvoided = needsBiggerUpgrade ? baseline : "NONE";
  const cveIds = (lib.cves || []).map(c => c.cve_id).filter(Boolean);
  return {
    cves_cleared: lib.cve_count,
    kev_cleared: kevCount,
    consumers_relieved: lib.total_consumer_count,
    direct_relieved: lib.direct_consumer_count || 0,
    transitive_relieved: lib.transitive_consumer_count || 0,
    projects_avoiding_bigger_upgrade: needsBiggerUpgrade ? lib.total_consumer_count : 0,
    direct_avoiding_bigger_upgrade: needsBiggerUpgrade ? (lib.direct_consumer_count || 0) : 0,
    transitive_avoiding_bigger_upgrade: needsBiggerUpgrade ? (lib.transitive_consumer_count || 0) : 0,
    effort_before: baseline,
    effort_after: "PATCH",
    effort_delta: Math.max(0, (effortRank[baseline] || 2) - effortRank.PATCH),
    biggest_jump_avoided: biggestJumpAvoided,
    nearest_safe_version: lib.nearest_safe_version || "-",
    current_release: lib.release || "-",
    cve_ids: cveIds
  };
}

function simulatePatchAmplifier(ampRow, filteredLibraries) {
  const libs = ampRow.visible_libraries.map(id => filteredLibraries.find(l => l.id === id)).filter(Boolean);
  return {
    libs_cleared: libs.length,
    cves_cleared: libs.reduce((s,l) => s + l.cve_count, 0),
    consumers_relieved: ampRow.consumer_project_count_affected
  };
}

function simulatePatchFramework(fwRow) {
  return {
    libs_cleared: fwRow.library_count,
    cves_cleared: fwRow.cve_count,
    consumers_relieved: fwRow.consumer_count
  };
}

function renderTable(columns, rows, rowIdFn, rowCellsFn) {
  els.tableHead.innerHTML = "";
  columns.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label;
    if (col.sortKey) {
      th.onclick = () => {
        if (state.sort.key === col.sortKey) {
          state.sort.dir = state.sort.dir === "asc" ? "desc" : "asc";
        } else {
          state.sort.key = col.sortKey;
          state.sort.dir = col.defaultDir || "desc";
        }
        render();
      };
    }
    els.tableHead.appendChild(th);
  });

  els.tableBody.innerHTML = "";
  rows.forEach((row, idx) => {
    const tr = document.createElement("tr");
    const id = rowIdFn(row);
    tr.dataset.id = id;
    if (state.selected === id) tr.classList.add("sel");
    tr.onclick = () => { state.selected = id; renderDetail(row); highlightSelected(); };
    rowCellsFn(row, idx).forEach(html => {
      const td = document.createElement("td");
      td.innerHTML = html;
      tr.appendChild(td);
    });
    els.tableBody.appendChild(tr);
  });

  els.rowCount.textContent = `${rows.length} rows`;
}

function highlightSelected() {
  els.tableBody.querySelectorAll("tr").forEach(tr => tr.classList.toggle("sel", tr.dataset.id === state.selected));
}

function renderTranches(libs) {
  const counts = { PATCH:0, MINOR:0, MAJOR:0, DEAD_END:0, UNKNOWN:0 };
  libs.forEach(l => counts[l.effort_class] = (counts[l.effort_class] || 0) + 1);
  els.tranchePills.innerHTML = "";
  EFFORTS.forEach(eff => {
    const b = document.createElement("button");
    b.className = `chip effort-${eff} ${state.trancheFocus === eff ? "sel" : ""}`;
    b.textContent = `${eff.replace("_","-")}: ${counts[eff] || 0}`;
    b.onclick = () => {
      state.trancheFocus = state.trancheFocus === eff ? null : eff;
      render();
    };
    els.tranchePills.appendChild(b);
  });
  if (state.trancheFocus) {
    const clear = document.createElement("button");
    clear.className = "chip chip-clear";
    clear.textContent = "× Clear";
    clear.onclick = () => {
      state.trancheFocus = null;
      render();
    };
    els.tranchePills.appendChild(clear);
  }
  if (state.mode === "project-remediation") {
    const planRows = computeProjectRemediationRows(libs);
    const avoidableCount = planRows.filter(r => Number(r.avoidable_major_migrations || 0) > 0).length;
    const toggle = document.createElement("button");
    toggle.className = `chip ${state.projectRemediationAvoidableMajorOnly ? "sel" : ""}`;
    toggle.textContent = `Avoidable MAJOR only (${avoidableCount})`;
    toggle.title = "Show only projects with major migrations that can be deferred via backpatch work.";
    toggle.onclick = () => {
      state.projectRemediationAvoidableMajorOnly = !state.projectRemediationAvoidableMajorOnly;
      render();
    };
    els.tranchePills.appendChild(toggle);
  }
}

function openProjectRemediationForProject(projectId) {
  if (!projectId) return;
  setMode("project-remediation", `prp:${projectId}`);
  state.projectRemediationAvoidableMajorOnly = false;
  render();
}

  if (state.mode === "frameworks") {

      <h4>How it could be fixed</h4>
      <p class="small">${assessment.remediation_type === "CREATE_PATCH" ? "Create-patch case: current tip release is vulnerable in this snapshot, so remediation is patch creation rather than classic backport." : (bpClass === "PROBABLE" ? "Probable backpatch case: no safe PATCH or MINOR jump is visible in this snapshot (major-only or no safe jump)." : "Likely backpatch case: no safe PATCH jump is available, but safe MINOR jump exists and should be compared against backpatch effort.")}</p>
      <p class="small">${patchDeadEndGuidance}</p>

      <ol class="list">

          <div class="k">Effort shift</div><div>${sim.effort_before} -> ${sim.effort_after}</div>
          <div class="k">CVEs potentially addressed</div><div>${sim.cves_cleared}</div>
          <div class="k">🔥 KEV potentially addressed</div><div>${sim.kev_cleared}</div>
          <div class="k">Projects helped</div><div>${sim.consumers_relieved} (${sim.direct_relieved} direct / ${sim.transitive_relieved} transitive)</div>

        ${projects.length > 30 ? `<li class="small">...and ${projects.length - 30} more</li>` : ""}
      </ul>
    `;
    return;
  }

  if (state.mode === "projects") {
    const p = item;
    const ns = (p.namespace || parseProjectId(p.id).namespace || "unknown").toUpperCase();
    const ref = renderProjectRefRich(p);
    const nsPill = ns === "GITHUB" ? "" : `<span class="ns-pill">${ns}</span>`;
    const librariesById = new Map((state.dataset.libraries || []).map(lib => [lib.id, lib]));
    let directLibCount = 0;
    let transitiveLibCount = 0;
    let totalCveExposure = 0;
    let totalKevExposure = 0;
    let maxEpssSeen = 0;
    const cveSummary = new Map();

    const libraryRows = (p.visible_libraries || []).map(id => {
      const parts = parseLibraryId(id);
      const lib = librariesById.get(id);
      const isDirect = !!(lib && (lib.direct_consumer_project_ids || []).includes(p.id));
      if (isDirect) directLibCount += 1; else transitiveLibCount += 1;
      totalCveExposure += Number((lib && lib.cve_count) || 0);
      totalKevExposure += Number((lib && lib.kev_cve_count) || 0);
      maxEpssSeen = Math.max(maxEpssSeen, Number((lib && lib.epss_max) || 0));

      (lib && lib.cves || []).forEach(cve => {
        const key = cve.cve_id;
        if (!key) return;
        if (!cveSummary.has(key)) {
          cveSummary.set(key, {
            cve_id: key,
            max_cvss: Number(cve.cvss || 0),
            max_epss: Number(cve.epss || 0),
            kev: !!cve.kev,
            lib_hits: 0,
            direct_hits: 0,
            transitive_hits: 0
          });
        }
        const row = cveSummary.get(key);
        row.max_cvss = Math.max(row.max_cvss, Number(cve.cvss || 0));
        row.max_epss = Math.max(row.max_epss, Number(cve.epss || 0));
        row.kev = row.kev || !!cve.kev;
        row.lib_hits += 1;
        if (isDirect) row.direct_hits += 1; else row.transitive_hits += 1;

    const cveRows = [...cveSummary.values()]
      .sort((a, b) => Number(b.kev) - Number(a.kev) || b.max_cvss - a.max_cvss || b.max_epss - a.max_epss || b.lib_hits - a.lib_hits)

      .map(r => `<tr>
        <td>${renderCveButton(r.cve_id)}</td>
        <td>${r.kev ? `<span class="badge kev-fire">🔥 KEV</span>` : "-"}</td>
        <td>${fmt(r.max_cvss,1)}</td>
        <td>${fmt(r.max_epss,3)}</td>
        <td>${r.lib_hits}</td>
        <td>${r.direct_hits}</td>
        <td>${r.transitive_hits}</td>
      </tr>`).join("");
    const uniqueCves = cveSummary.size;
    const uniqueKevCves = [...cveSummary.values()].filter(r => r.kev).length;

    els.detail.innerHTML = `
      <div class="project-head">

          <thead><tr><th>Namespace</th><th>Group</th><th>Artifact</th><th>Version</th><th>CVEs</th><th>🔥 KEV</th><th>EPSS</th><th>Impact</th></tr></thead>
          <tbody>${libraryRows || `<tr><td colspan="8" class="small">No vulnerable libraries in current filter.</td></tr>`}</tbody>
        </table>
      </div>
      <h4>Top CVE exposures in this project</h4>
      <div class="libs-table-wrap">
        <table class="libs-table">
          <thead><tr><th>CVE</th><th>KEV</th><th>Max CVSS</th><th>Max EPSS</th><th>Library hits</th><th>Direct hits</th><th>Transitive hits</th></tr></thead>
          <tbody>${cveRows || `<tr><td colspan="7" class="small">No CVE details available for current project/library filter.</td></tr>`}</tbody>
        </table>
      </div>
    `;
    const planBtn = els.detail.querySelector("#openProjectPlan");
    if (planBtn) {
      planBtn.onclick = () => openProjectRemediationForProject(p.id);
    }
    return;
  }

  els.detail.innerHTML = `<pre class="small">${JSON.stringify(item, null, 2)}</pre>`;
}

function renderMode(filteredLibraries) {
  renderTranches(filteredLibraries);

  if (state.mode === "libraries") {
    const rows = filteredLibraries;
    renderTable(
      [
        {label:"#"},
        {label:"Library", sortKey:"proj"},
        {label:"Version", sortKey:"release"},
        {label:"CVSS", sortKey:"max_cvss"},
        {label:"CVEs", sortKey:"cve_count"},
        {label:"KEV", sortKey:"kev_cve_count"},
        {label:"EPSS", sortKey:"epss_max"},
        {label:"Projects", sortKey:"total_consumer_count"},
        {label:"Direct", sortKey:"direct_consumer_count"},
        {label:"Upgrade", sortKey:"effort_class"},
        {label:"Safe at", sortKey:"nearest_safe_version"},
        {label:"Max patch", sortKey:"max_safe_patch_same_minor"},
        {label:"Top amplifier"}
      ],
      rows,
      r => r.id,
      (r,idx) => [
        idx + 1,
        renderLibraryCell(r),
        r.release,
        fmt(r.max_cvss,1),
        r.cve_count,
        r.kev_cve_count ? `<span class="badge kev">${r.kev_cve_count}</span>` : "0",
        fmt(r.epss_max,3),
        r.total_consumer_count,
        r.direct_consumer_count,
        `<span class="chip effort-${r.effort_class}">${r.effort_class.replace("_","-")}</span>`,
        r.nearest_safe_version || "-",
        r.max_safe_patch_same_minor || "-",
        r.top_amplifier ? renderLibraryRef(r.top_amplifier.meta, r.top_amplifier.proj, "", r.top_amplifier.namespace || "") : "-"
      ]
    );
    if (!rows.length) renderDetail(null); else renderDetail(rows.find(r => r.id === state.selected) || rows[0]);
    return;
  }

  if (state.mode === "top-fixes") {
    const rows = computeTopFixRows(filteredLibraries);
    const sortable = rows.slice();
    const key = state.sort.key;
    const dir = state.sort.dir === "asc" ? 1 : -1;
    if (sortable.length && Object.prototype.hasOwnProperty.call(sortable[0], key)) {
      sortable.sort((a, b) => {
        const av = a[key];
        const bv = b[key];
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
        return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
      });
    }
    renderTable(
      [
        {label:"#"}, {label:"Action", sortKey:"action_type", defaultDir:"asc"}, {label:"Target", sortKey:"target", defaultDir:"asc"},
        {label:"Projects", sortKey:"projects"}, {label:"CVEs", sortKey:"cves_cleared"}, {label:"Libs", sortKey:"libs_cleared"},
        {label:"Effort", sortKey:"effort"}, {label:"Score", sortKey:"score"}
      ],
      sortable,
      r => r.id,
      (r,idx) => [idx+1, renderTopFixAction(r), renderTopFixTarget(r), r.projects, r.cves_cleared, r.libs_cleared, r.effort, fmt(r.score,3)]
    );
    renderDetail(sortable.find(r => r.id === state.selected) || sortable[0] || null);
    return;
  }

  if (state.mode === "backpatch-priority") {
    const rows = filteredLibraries.slice();
    const sortable = rows.slice();
    const key = state.sort.key;
    const dir = state.sort.dir === "asc" ? 1 : -1;
    if (sortable.length) {
      sortable.sort((a, b) => {
        const pa = state.libraryProfiles.get(a.id);
        const pb = state.libraryProfiles.get(b.id);
        const av = key in a ? a[key] : (pa ? pa[key] : undefined);
        const bv = key in b ? b[key] : (pb ? pb[key] : undefined);
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
        return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
      });
    }
    renderTable(
      [
        {label:"#"},
        {label:"Priority", sortKey:"patch_candidate_score"},
        {label:"Pkg", sortKey:"namespace", defaultDir:"asc"},
        {label:"Package", sortKey:"proj", defaultDir:"asc"},
        {label:"Current", sortKey:"release", defaultDir:"asc"},
        {label:"Latest", sortKey:"latest_version", defaultDir:"asc"},
        {label:"Age", sortKey:"age_bucket", defaultDir:"asc"},
        {label:"Effort", sortKey:"effort_class", defaultDir:"asc"},
        {label:"CVSS", sortKey:"max_cvss"},
        {label:"KEV", sortKey:"kev_cve_count"},
        {label:"Projects", sortKey:"total_consumer_count"},
        {label:"Dep Type", sortKey:"direct_transitive_indicator", defaultDir:"asc"},
        {label:"Amplifier", sortKey:"amplifier_library", defaultDir:"asc"},
        {label:"Patch Score", sortKey:"patch_candidate_score"},
        {label:"Action", sortKey:"recommended_action", defaultDir:"asc"},
        {label:"OSERA Patch", sortKey:"alliance_patch_required_score", defaultDir:"desc"},
        {label:"Patch ROI", sortKey:"patch_roi"}
      ],
      sortable,
      r => `bpc:${r.id}`,
      (r, idx) => {
        const p = state.libraryProfiles.get(r.id);
        return [
          idx + 1,
          renderPriorityBadge(p),
          renderNamespaceBadge(r.namespace, false, r.meta || ""),
          renderLibraryRef(r.meta, r.proj, "", ""),
          r.release || "-",
          p && p.assessment ? (p.assessment.latest_release || "-") : "-",
          p ? p.age_bucket : "Unknown",
          `<span class="chip effort-${r.effort_class}">${r.effort_class || "UNKNOWN"}</span>`,
          fmt(r.max_cvss,1),
          r.kev_cve_count || 0,
          r.total_consumer_count || 0,
          p ? p.direct_transitive_indicator : "-",
          p ? p.amplifier_library : "-",
          p ? fmt(p.patch_candidate_score,1) : "-",
          p ? `<span class="chip" title="${escapeHtml(p.recommended_action_explanation || "")}">${p.recommended_action}</span>` : "-",
          renderAlliancePatchIndicator(p),
          p ? fmt(p.patch_roi,2) : "-"
        ];
      }
    );
    const selected = sortable.find(r => `bpc:${r.id}` === state.selected) || sortable[0] || null;
    if (selected && state.selected !== `bpc:${selected.id}`) state.selected = `bpc:${selected.id}`;
    renderDetail(selected || null);
    return;
  }

  if (state.mode === "backpatch-landscape") {
    const rows = computeBackpatchLandscapeRows(filteredLibraries);
    const sortable = rows.slice();
    const key = state.sort.key;
    const dir = state.sort.dir === "asc" ? 1 : -1;
    if (sortable.length && Object.prototype.hasOwnProperty.call(sortable[0], key)) {
      sortable.sort((a, b) => {
        const av = a[key];
        const bv = b[key];
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
        return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
      });
    }
    renderTable(
      [
        {label:"#"},
        {label:"Action", sortKey:"action_type", defaultDir:"asc"},
        {label:"Library", sortKey:"proj", defaultDir:"asc"},
        {label:"Current", sortKey:"release", defaultDir:"asc"},
        {label:"Nearest safe", sortKey:"nearest_safe_version", defaultDir:"asc"},
        {label:"Projects (DIR/TRA)", sortKey:"total_projects"},
        {label:"CVEs", sortKey:"cve_count"},
        {label:"Edge vulns", sortKey:"edge_vulns_total"},
        {label:"Score", sortKey:"score"}
      ],
      sortable,
      r => r.id,
      (r, idx) => [
        idx + 1,
        renderTopFixAction(r),
        renderLibraryRef(r.meta, r.proj, "", r.namespace),
        r.release,
        r.nearest_safe_version || "-",
        `${r.total_projects} (${r.direct_projects}/${r.transitive_projects})`,
        `${r.cve_count}${r.kev_cve_count ? ` <span class="badge kev-fire">🔥 ${r.kev_cve_count}</span>` : ""}`,
        `${r.edge_vulns_total} (${r.edge_vulns_direct}/${r.edge_vulns_transitive})`,
        fmt(r.score,3)
      ]
    );
    renderDetail(sortable.find(r => r.id === state.selected) || sortable[0] || null);
    return;
  }

  if (state.mode === "amplifiers") {
    const rows = computeAmplifierRows(filteredLibraries);
    renderTable(
      [
        {label:"#"}, {label:"Amplifier", sortKey:"amplifier_label", defaultDir:"asc"}, {label:"Affected projects", sortKey:"consumer_project_count_affected"},
        {label:"Visible libs", sortKey:"risk_signal"}, {label:"CVE total", sortKey:"cve_count_total"}, {label:"Risk", sortKey:"risk_signal"}
      ],
      rows,
      r => `amp:${r.amplifier_id}`,
      (r,idx) => {
        const ns = r.visible_libraries && r.visible_libraries.length ? parseLibraryId(r.visible_libraries[0]).namespace : "";
        return [idx+1, renderAmplifierLabel(r.amplifier_label, ns), r.consumer_project_count_affected, r.visible_libraries.length, r.cve_count_total, fmt(r.risk_signal,2)];
      }
    );
    renderDetail(rows.find(r => `amp:${r.amplifier_id}` === state.selected) || rows[0] || null);
    return;
  }

  if (state.mode === "frameworks") {
    const rows = computeFrameworkRows(filteredLibraries);
    renderTable(
      [
        {label:"#"}, {label:"Framework", sortKey:"label", defaultDir:"asc"}, {label:"Libraries", sortKey:"library_count"},
        {label:"Projects", sortKey:"consumer_count"}, {label:"CVEs", sortKey:"cve_count"}, {label:"KEV", sortKey:"kev_count"}, {label:"Risk", sortKey:"risk_signal"}
      ],
      rows,
      r => `fw:${r.id}`,
      (r,idx) => [idx+1, renderFrameworkLabel(r), r.library_count, r.consumer_count, r.cve_count, r.kev_count, fmt(r.risk_signal,2)]
    );
    renderDetail(rows.find(r => `fw:${r.id}` === state.selected) || rows[0] || null);
    return;
  }

  if (state.mode === "dead-ends") {
    const rows = filteredLibraries.filter(l => l.effort_class === "DEAD_END");
    renderTable(
      [
        {label:"#"}, {label:"Library", sortKey:"proj"}, {label:"Version", sortKey:"release"}, {label:"CVSS", sortKey:"max_cvss"},
        {label:"CVEs", sortKey:"cve_count"}, {label:"Projects", sortKey:"total_consumer_count"}, {label:"Top amplifier"}
      ],
      rows,
      r => r.id,
      (r,idx) => [idx+1, renderLibraryCell(r), r.release, fmt(r.max_cvss,1), r.cve_count, r.total_consumer_count, r.top_amplifier ? renderLibraryRef(r.top_amplifier.meta, r.top_amplifier.proj, "", r.top_amplifier.namespace || "") : "-"]
    );
    renderDetail(rows.find(r => r.id === state.selected) || rows[0] || null);
    return;
  }

  if (state.mode === "projects") {
    const rows = sortRowsByState(computeProjectRows(filteredLibraries));
    renderTable(
      [
        {label:"#"}, {label:"Project", sortKey:"project_ref", defaultDir:"asc"}, {label:"Group", sortKey:"project_group", defaultDir:"asc"},
        {label:"Vuln libs", sortKey:"visible_count"}, {label:"Max CVSS", sortKey:"visible_max_cvss"}, {label:"KEV libs", sortKey:"visible_kev"}
      ],
      rows,
      r => `prj:${r.id}`,
      (r,idx) => [idx+1, renderProjectRefRich(r), r.project_group || "General", r.visible_count, fmt(r.visible_max_cvss,1), r.visible_kev]
    );
    renderDetail(rows.find(r => `prj:${r.id}` === state.selected) || rows[0] || null);
    return;
  }

  if (state.mode === "cves") {
    const rows = computeCveRows(filteredLibraries);
    const sortable = rows.slice();
    const key = state.sort.key;
    const dir = state.sort.dir === "asc" ? 1 : -1;
    if (sortable.length && Object.prototype.hasOwnProperty.call(sortable[0], key)) {
      sortable.sort((a, b) => {
        const av = a[key];
        const bv = b[key];
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
        return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
      });
    }
    renderTable(
      [
        {label:"#"},
        {label:"CVE", sortKey:"cve_id", defaultDir:"asc"},
        {label:"Reported", sortKey:"reported_date", defaultDir:"desc"},
        {label:"Summary", sortKey:"summary", defaultDir:"asc"},
        {label:"CVSS", sortKey:"max_cvss"},
        {label:"EPSS", sortKey:"max_epss"},
        {label:"KEV", sortKey:"kev"},
        {label:"Lib hits", sortKey:"lib_hits"},
        {label:"Project hits", sortKey:"project_hits"},
        {label:"Direct", sortKey:"direct_project_hits"},
        {label:"Transitive", sortKey:"transitive_project_hits"}
      ],
      sortable,
      r => r.id,
      (r, idx) => [
        idx + 1,
        renderCveButton(r.cve_id),
        r.reported_date_label || "-",
        escapeHtml((r.summary || "").slice(0, 100) || "-"),
        fmt(r.max_cvss,1),
        fmt(r.max_epss,3),
        r.kev ? `<span class="badge kev-fire">🔥 KEV</span>` : "-",
        r.lib_hits,
        r.project_hits,
        r.direct_project_hits,
        r.transitive_project_hits
      ]
    );
    renderDetail(sortable.find(r => r.id === state.selected) || sortable[0] || null);
    return;
  }

  if (state.mode === "project-remediation") {
    const baseRows = computeProjectRemediationRows(filteredLibraries);
    const rows = state.projectRemediationAvoidableMajorOnly
      ? baseRows.filter(r => Number(r.avoidable_major_migrations || 0) > 0)
      : baseRows;
    const groups = computeProjectGroupRollups(rows).slice(0, 8);
    const sortable = rows.slice();
    const key = state.sort.key;
    const dir = state.sort.dir === "asc" ? 1 : -1;
    if (sortable.length && Object.prototype.hasOwnProperty.call(sortable[0], key)) {
      sortable.sort((a, b) => {
        const av = a[key];
        const bv = b[key];
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
        return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
      });
    }
    renderTable(
      [
        {label:"#"},
        {label:"Priority", sortKey:"project_priority_score"},
        {label:"Project", sortKey:"project_ref", defaultDir:"asc"},
        {label:"Group", sortKey:"project_group", defaultDir:"asc"},
        {label:"Vuln deps", sortKey:"visible_count"},
        {label:"CVE exposure", sortKey:"total_cve_exposure"},
        {label:"Effort mix", sortKey:"dead_end_count"},
        {label:"OSERA patch reqs", sortKey:"alliance_patch_count"},
        {label:"Amplifier patches", sortKey:"amplifier_patch_count"},
        {label:"BOM overrides", sortKey:"bom_override_count"},
        {label:"Estimated actions", sortKey:"estimated_actions"},
        {label:"Strategy", sortKey:"strategy", defaultDir:"asc"}
      ],
      sortable,
      r => `prp:${r.id}`,
      (r, idx) => [
        idx + 1,
        renderPriorityBadge({ priority_css: r.project_priority_score >= 70 ? "prio-red" : r.project_priority_score >= 50 ? "prio-orange" : r.project_priority_score >= 30 ? "prio-yellow" : "prio-green", priority_band: fmt(r.project_priority_score,1) }),
        renderProjectRefRich(r),
        r.project_group || "General",
        r.visible_count,
        `${r.total_cve_exposure} (${r.unique_cve_count} unique)`,
        `P${r.patch_count}/m${r.minor_count}/M${r.major_count}/D${r.dead_end_count}`,
        r.alliance_patch_count,
        r.amplifier_patch_count,
        r.bom_override_count,
        r.estimated_actions,
        renderStrategyPill(r.strategy)
      ]
    );
    const selected = sortable.find(r => `prp:${r.id}` === state.selected) || sortable[0] || null;
    if (selected && state.selected !== `prp:${selected.id}`) state.selected = `prp:${selected.id}`;
    if (selected) {
      renderDetail(selected);
      const groupRows = groups.map(g => `<tr>
        <td>${g.group}</td>
        <td>${g.projects}</td>
        <td>${fmt(g.total_risk,1)}</td>
        <td>${g.vulnerable_libraries}</td>
        <td>${g.patch}/${g.minor}/${g.major}/${g.dead_end}</td>
        <td>${g.alliance_patches}</td>
        <td>${g.top_project || "-"}</td>
      </tr>`).join("");
      els.detail.innerHTML += `
        <h4>Project group rollup (top risk groups)</h4>
        <div class="libs-table-wrap">
          <table class="libs-table">
            <thead><tr><th>Group</th><th>Projects</th><th>Total risk</th><th>Vuln libs</th><th>Effort mix</th><th>OSERA patch reqs</th><th>Top project</th></tr></thead>
            <tbody>${groupRows || `<tr><td colspan="7" class="small">No group rollup rows.</td></tr>`}</tbody>
          </table>
        </div>
      `;
    } else {
      renderDetail(null);
    }
  }
}

function render() {
  buildModeBar();
  buildEffortChips();

  const libs = computeFilteredLibraries();
  renderFilterCompactSummary(libs);
  updateCartVisibility(libs);
  renderMode(libs);
}

async function loadDatasetSelection(url) {
  state.datasetUrl = url;
  state.dataset = await fetchDataset(url);
  localStorage.setItem(STORAGE_KEYS.lastDataset, String(url));

  const m = await hydrateMetaOverlays(state.dataset.meta || {});
  state.dataset.meta = m;
  applyMetaPresentation(m);

  populateFilterOptions();
  loadCart();
  state.selected = null;
  state.detailImpact = "all";
  render();
}

function bindEvents() {
  $("#helpBtn").onclick = () => openDocModal("howto");
  if (els.helpTabHowto) {
    els.helpTabHowto.addEventListener("click", e => {
      e.preventDefault();
      state.helpTab = "howto";
      renderHelpTabContent();
    });
  }
  if (els.helpTabGlossary) {
    els.helpTabGlossary.addEventListener("click", e => {
      e.preventDefault();
      state.helpTab = "glossary";
      renderHelpTabContent();
    });
  }
  if (els.docModal) {
    els.docModal.addEventListener("click", e => {
      const t = e.target;
      if (!(t instanceof Element)) return;
      const tab = t.closest("#helpTabHowto, #helpTabGlossary");
      if (!tab) return;
      e.preventDefault();
      e.stopPropagation();
      state.helpTab = tab.id === "helpTabGlossary" ? "glossary" : "howto";
      renderHelpTabContent();
    });
  }
  els.themeBtn.onclick = toggleTheme;
  if (els.filterCollapseBtn) {
    els.filterCollapseBtn.onclick = () => setFilterPanelCollapsed(!state.filterPanelCollapsed);
  }
  els.cartBtn.onclick = () => els.cartPane.classList.add("open");
  $("#closeCart").onclick = () => els.cartPane.classList.remove("open");
  $("#genYamlFooter").onclick = () => openModal("OpenRewrite YAML", generateYaml());
  $("#genPromptFooter").onclick = () => openModal("Impact-analysis prompt", generateImpactPrompt());
  $("#clearCart").onclick = () => {
    state.cart = [];
    saveCart();
  };

  $("#closeModal").onclick = closeModal;
  $("#closeDocModal").onclick = closeDocModal;
  $("#closeVersionModal").onclick = closeVersionModal;
  $("#closeLibraryModal").onclick = closeLibraryModal;
  $("#closeCveModal").onclick = closeCveModal;
  $("#copyModal").onclick = async () => {
    try { await navigator.clipboard.writeText(els.modalText.value); } catch {}
  };
  els.modal.addEventListener("click", e => { if (e.target === els.modal) closeModal(); });
  els.docModal.addEventListener("click", e => { if (e.target === els.docModal) closeDocModal(); });
  els.versionModal.addEventListener("click", e => { if (e.target === els.versionModal) closeVersionModal(); });
  els.libraryModal.addEventListener("click", e => { if (e.target === els.libraryModal) closeLibraryModal(); });
  els.cveModal.addEventListener("click", e => { if (e.target === els.cveModal) closeCveModal(); });
  $("#versionViewMode").addEventListener("change", e => { state.versionExplorer.viewMode = e.target.value || "all"; renderVersionExplorer(); });
  $("#versionCollapseRuns").addEventListener("change", e => { state.versionExplorer.collapseRuns = !!e.target.checked; renderVersionExplorer(); });
  $("#versionShowSafe").addEventListener("change", e => { state.versionExplorer.showSafe = !!e.target.checked; renderVersionExplorer(); });
  els.tableBody.addEventListener("click", e => {
    const t = e.target;
    if (!(t instanceof Element)) return;
    const cveBtn = t.closest("[data-open-cve]");
    if (!cveBtn) return;
    e.preventDefault();
    e.stopPropagation();
    const cveId = cveBtn.getAttribute("data-open-cve") || "";
    if (cveId) openCveModalById(cveId);
  });
  els.detail.addEventListener("click", e => {
    const t = e.target;
    if (!(t instanceof Element)) return;
    const fwBtn = t.closest("[data-open-framework]");
    if (fwBtn) {
      const fwId = fwBtn.getAttribute("data-open-framework") || "";
      if (fwId) openFrameworkView(fwId, false);
      return;
    }
    const cveBtn = t.closest("[data-open-cve]");
    if (cveBtn) {
      const cveId = cveBtn.getAttribute("data-open-cve") || "";
      if (cveId) openCveModalById(cveId);
      return;
    }
    const libBtn = t.closest("[data-open-library]");
    if (libBtn) {
      const libId = libBtn.getAttribute("data-open-library") || "";
      const lib = getLibraryById(libId);
      if (lib) openLibraryDetailsModal(lib);
      return;
    }
    const btn = t.closest("[data-open-version]");
    if (!btn) return;
    const id = btn.getAttribute("data-open-version") || "";
    const lib = getLibraryById(id);
    if (lib) openVersionExplorerForLibrary(lib);
  });
  els.libraryModalBody.addEventListener("click", e => {
    const t = e.target;
    if (!(t instanceof Element)) return;
    const fwBtn = t.closest("[data-open-framework]");
    if (fwBtn) {
      const fwId = fwBtn.getAttribute("data-open-framework") || "";
      if (fwId) openFrameworkView(fwId, true);
      return;
    }
    const cveBtn = t.closest("[data-open-cve]");
    if (cveBtn) {
      const cveId = cveBtn.getAttribute("data-open-cve") || "";
      if (cveId) openCveModalById(cveId);
      return;
    }
    const btn = t.closest("[data-open-version]");
    if (!btn) return;
    const id = btn.getAttribute("data-open-version") || "";
    const lib = getLibraryById(id);
    if (!lib) return;
    closeLibraryModal();
    openVersionExplorerForLibrary(lib);
  });
  els.cveModalBody.addEventListener("click", e => {
    const t = e.target;
    if (!(t instanceof Element)) return;
    const libBtn = t.closest("[data-open-library]");
    if (libBtn) {
      const libId = libBtn.getAttribute("data-open-library") || "";
      const lib = getLibraryById(libId);
      if (lib) {
        closeCveModal();
        openLibraryDetailsModal(lib);
      }
      return;
    }
    const cveBtn = t.closest("[data-open-cve]");
    if (cveBtn) {
      const cveId = cveBtn.getAttribute("data-open-cve") || "";
      if (cveId) openCveModalById(cveId);
    }
  });

  const debounce = (fn, ms = 120) => {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  };

  const renderFast = debounce(() => render(), 120);

  $("#cvssMin").addEventListener("input", e => {
    state.filters.cvssMin = Number(e.target.value);
    $("#cvssMinValue").textContent = Number(e.target.value).toFixed(1);
    renderFast();
  });

  $("#departmentFilter").addEventListener("change", e => { state.filters.department = e.target.value; render(); });
  $("#namespaceFilter").addEventListener("change", e => { state.filters.namespace = e.target.value; updateNamespacePreview(); render(); });
  $("#epssMin").addEventListener("input", e => {
    state.filters.epssMin = Number(e.target.value || 0);
    $("#epssMinValue").textContent = state.filters.epssMin.toFixed(3);
    renderFast();
  });
  state.filters.epssMin = Number($("#epssMin").value || 0);
  $("#epssMinValue").textContent = state.filters.epssMin.toFixed(3);
  $("#searchInput").addEventListener("input", debounce(e => { state.filters.search = e.target.value || ""; render(); }, 120));
  $("#kevOnly").addEventListener("change", e => { state.filters.kevOnly = e.target.checked; render(); });
  $("#directOnly").addEventListener("change", e => { state.filters.directOnly = e.target.checked; render(); });
  $("#transitiveOnly").addEventListener("change", e => { state.filters.transitiveOnly = e.target.checked; render(); });
  $("#backpatchOnly").addEventListener("change", e => { state.filters.backpatchOnly = e.target.checked; render(); });
  $("#ageBucketFilter").addEventListener("change", e => { state.filters.ageBucket = e.target.value || ""; render(); });
  $("#minProjectsFilter").addEventListener("input", debounce(e => { state.filters.minProjects = Number(e.target.value || 0); render(); }, 120));
  $("#actionFilter").addEventListener("change", e => { state.filters.recommendedAction = e.target.value || ""; render(); });

  $("#projectRefInput").addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    const v = e.target.value.trim();
    if (!v) return;
    if (!state.filters.projectRefChips.includes(v)) state.filters.projectRefChips.push(v);
    e.target.value = "";
    renderProjectRefChips();
    render();
  });

  els.datasetSelect.addEventListener("change", e => loadDatasetSelection(e.target.value));
}

function renderProjectRefChips() {
  const box = $("#projectRefChips");
  box.innerHTML = "";
  state.filters.projectRefChips.forEach(chip => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = `${chip} ×`;
    b.onclick = () => {
      state.filters.projectRefChips = state.filters.projectRefChips.filter(c => c !== chip);
      renderProjectRefChips();
      render();
    };
    box.appendChild(b);
  });
}

function setFilterPanelCollapsed(collapsed) {
  state.filterPanelCollapsed = !!collapsed;
  if (els.filterShell) {
    els.filterShell.classList.toggle("collapsed", state.filterPanelCollapsed);
  }
  if (els.filterCollapseBtn) {
    els.filterCollapseBtn.classList.toggle("collapsed", state.filterPanelCollapsed);
    const label = state.filterPanelCollapsed ? "Expand filters" : "Collapse filters";
    els.filterCollapseBtn.setAttribute("aria-label", label);
    els.filterCollapseBtn.setAttribute("title", label);
    els.filterCollapseBtn.setAttribute("aria-expanded", String(!state.filterPanelCollapsed));
    const icon = els.filterCollapseBtn.querySelector(".toggle-icon");
    if (icon) icon.textContent = state.filterPanelCollapsed ? "+" : "−";
  }
  localStorage.setItem("risk-nav-filters-collapsed", state.filterPanelCollapsed ? "1" : "0");
}

function renderFilterCompactSummary(filteredLibraries) {
  if (!els.filterCompactSummary) return;
  const f = state.filters;
  const projectIds = new Set();
  (filteredLibraries || []).forEach(lib => {
    (lib.consumer_project_ids || []).forEach(id => projectIds.add(id));
  });
  const selectedEfforts = EFFORTS.filter(e => f.effort.has(e));
  const effortLabel = selectedEfforts.length === EFFORTS.length ? "Upgrade: all" : `Upgrade: ${selectedEfforts.join("/")}`;
  const flags = [
    f.kevOnly ? "KEV" : "",
    f.directOnly ? "DIR" : "",
    f.transitiveOnly ? "TRA" : "",
    f.backpatchOnly ? "BP" : ""
  ].filter(Boolean).join(",");
  const pills = [
    `Group: ${f.department || "All"}`,
    `Namespace: ${f.namespace ? namespaceMeta(f.namespace).label : "All"}`,
    `CVSS>=${Number(f.cvssMin || 0).toFixed(1)}`,
    `EPSS>=${Number(f.epssMin || 0).toFixed(3)}`,
    effortLabel,
    `Age: ${f.ageBucket || "All"}`,
    `Action: ${f.recommendedAction || "All"}`,
    `Refs: ${f.projectRefChips.length}`,
    `Min projects: ${Number(f.minProjects || 0)}`,
    `Flags: ${flags || "none"}`,
    `Filtered libs: ${(filteredLibraries || []).length}`,
    `Filtered projects: ${projectIds.size}`
  ];
  if (state.mode === "project-remediation") {
    pills.push(`Avoidable MAJOR only: ${state.projectRemediationAvoidableMajorOnly ? "on" : "off"}`);
  }
  els.filterCompactSummary.innerHTML = pills.map(p => `<span class="filter-pill">${p}</span>`).join("");
}

async function init() {
  loadTheme();
  setFilterPanelCollapsed(localStorage.getItem("risk-nav-filters-collapsed") === "1");
  applyDetailWidth(localStorage.getItem("risk-nav-detail-width") || 420);
  initPaneSplitter();
  bindEvents();
  setMode(localStorage.getItem(STORAGE_KEYS.lastMode) || "libraries", null);

  state.manifest = await fetchManifest();
  const datasets = state.manifest.datasets || [];
  els.datasetSelect.innerHTML = datasets.map(d => `<option value="${d.url}">${d.label || d.url}</option>`).join("");

  const fromQuery = new URLSearchParams(location.search).get("data");
  const fromStorage = localStorage.getItem(STORAGE_KEYS.lastDataset);
  const initial = fromQuery || fromStorage || (datasets[0] && datasets[0].url);
  if (!initial) throw new Error("No datasets in manifest");

  if (initial && !datasets.find(d => d.url === initial)) {
    els.datasetSelect.insertAdjacentHTML("beforeend", `<option value="${initial}">${initial}</option>`);
  }
  els.datasetSelect.value = initial;

  await loadDatasetSelection(initial);
}

init().catch(err => {
  console.error(err);
  els.scopeMeta.textContent = `Failed to load: ${err.message}`;
});
</script>
</body>
</html>
