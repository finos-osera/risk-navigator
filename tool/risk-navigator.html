<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Risk Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #00253f;
  --cyan: #00b5e2;
  --blue: #0086bf;
  --teal: #3fb6a8;
  --teal-dark: #487a7b;
  --green: #43b02a;
  --soft: #f4f8fb;
  --mist: #e9f6fb;
  --bg: #f5f7fb;
  --panel: #ffffff;
  --ink: #16222e;
  --muted: #5b6770;
  --line: #e7edf2;
  --primary: var(--blue);
  --primary-soft: var(--mist);
  --accent: var(--cyan);
  --chip: #edf2fa;
  --good: #1f8b4c;
  --warn: #b96a00;
  --risk: #b42318;
  --dead: #6d28d9;
  --unknown: #6b7280;
  --kev: #b42318;
  --link: #0b5fff;
  --link-visited: #6b46c1;
  --detail-width: 420px;
}
:root[data-theme="dark"] {
  --bg: #101418;
  --panel: #182028;
  --ink: #e6edf5;
  --muted: #9aa6b2;
  --line: #2b3744;
  --primary: #4fc5e8;
  --primary-soft: #143948;
  --accent: #74def9;
  --chip: #223041;
  --good: #52d186;
  --warn: #f8b84e;
  --risk: #ff7b72;
  --dead: #b794f6;
  --unknown: #9aa6b2;
  --kev: #ff7b72;
  --link: #b8e6ff;
  --link-visited: #d6beff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Inter", system-ui, sans-serif;
  background: radial-gradient(circle at 0 0, #eaf2ff 0, transparent 35%), var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
:root[data-theme="dark"] body {
  background: radial-gradient(circle at 0 0, #17304a 0, transparent 35%), var(--bg);
}
header {
  background: var(--navy);
  border-bottom: 1px solid rgba(255, 255, 255, .12);
  box-shadow: 0 1px 2px rgba(0, 0, 0, .16);
  padding: 12px 18px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.h-row {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.brand {
  font-weight: 700;
  letter-spacing: .2px;
}
.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 42px;
  overflow: visible;
}
.brand-logo {
  width: auto;
  height: 32px;
  object-fit: contain;
  display: block;
}
.osera-logo {
  height: 32px;
  max-width: 142px;
  border-radius: 6px;
  background: #fff;
  padding: 4px 8px;
}
.brand-logo-link {
  display: flex;
  align-items: center;
  line-height: 0;
}
.brand-app {
  font-family: "Montserrat", system-ui, sans-serif;
  font-weight: 800;
  font-size: 20px;
  line-height: 1;
  color: #fff;
  letter-spacing: 0;
}
:root[data-theme="dark"] .brand-app {
  color: #fff;
}
header a {
  color: var(--accent);
}
header button.ghost {
  background: rgba(255, 255, 255, .08);
  border-color: rgba(255, 255, 255, .28);
  color: #fff;
}
header button.ghost:hover {
  background: rgba(255, 255, 255, .14);
}
header .meta {
  color: rgba(255, 255, 255, .78);
}
header .meta-pill {
  background: rgba(255, 255, 255, .08);
  border-color: rgba(255, 255, 255, .16);
  color: rgba(255, 255, 255, .88);
}
.icon-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
}
.meta {
  color: var(--muted);
  font-size: 12px;
}
.meta-pills {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.meta-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: color-mix(in srgb, var(--primary-soft) 64%, var(--panel) 36%);
  color: var(--ink);
}
.spacer { flex: 1; }
button, input, select {
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  padding: 7px 10px;
  border-radius: 8px;
  font-size: 12px;
}
button { cursor: pointer; }
button.primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
button.ghost {
  background: transparent;
}
main {
  padding: 12px;
  display: grid;
  grid-template-columns: minmax(0,1fr) 10px var(--detail-width);
  gap: 8px;
}
@media (max-width: 1024px) {
  main { grid-template-columns: 1fr; }
}
.splitter {
  border-radius: 10px;
  cursor: col-resize;
  background: color-mix(in srgb, var(--line) 70%, transparent);
  border: 1px solid color-mix(in srgb, var(--line) 65%, var(--panel) 35%);
  position: relative;
}
.splitter::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 42px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--muted) 55%, transparent);
}
@media (max-width: 1024px) {
  .splitter { display: none; }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
}
.filter-shell {
  border-bottom: 1px solid var(--line);
}
.filter-summary-row {
  min-height: 36px;
  padding: 5px 10px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--panel) 78%, var(--chip) 22%);
}
#filterCollapseBtn {
  flex: 0 0 auto;
  width: 28px;
  height: 28px;
  padding: 0;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
#filterCollapseBtn .toggle-icon {
  display: inline-block;
  font-size: 14px;
  line-height: 1;
}
.filter-compact-summary {
  min-width: 0;
  flex: 1;
  display: flex;
  align-items: center;
  align-content: center;
  flex-wrap: wrap;
  gap: 6px;
  overflow: visible;
  white-space: normal;
  min-height: 28px;
  padding: 2px 0;
}
.filter-pill {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 10px;
  color: var(--muted);
  background: color-mix(in srgb, var(--panel) 72%, var(--primary-soft) 28%);
}
.filter-shell.collapsed .filter-panel {
  display: none;
}
.filter-shell.collapsed .filter-summary-row {
  border-bottom: 0;
}
.filter-bar {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(4,minmax(0,1fr));
  gap: 8px;
}
@media (max-width: 1200px) {
  .filter-bar { grid-template-columns: repeat(2,minmax(0,1fr)); }
}
@media (max-width: 768px) {
  .filter-bar { grid-template-columns: 1fr; }
}
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .3px;
}
.modes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.mode-btn {
  background: color-mix(in srgb, var(--panel) 84%, var(--chip) 16%);
  border-color: color-mix(in srgb, var(--line) 85%, var(--panel) 15%);
  color: var(--ink);
  font-weight: 600;
}
#modeBar {
  position: sticky;
  top: 0;
  z-index: 9;
}
.mode-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 1px 0 color-mix(in srgb, #000 28%, transparent), 0 0 0 1px color-mix(in srgb, var(--primary) 55%, transparent) inset;
}
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: var(--chip);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 11px;
  padding: 4px 10px;
}
.chip.effort-PATCH { color: var(--good); }
.chip.effort-MINOR { color: var(--warn); }
.chip.effort-MAJOR { color: var(--risk); }
.chip.effort-DEAD_END { color: var(--dead); }
.chip.effort-UNKNOWN { color: var(--unknown); }
.chip.sel { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary-soft) inset; }
.strategy-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 999px;
  padding: 3px 8px;
  border: 1px solid var(--line);
  background: var(--chip);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2px;
  white-space: nowrap;
}
.strategy-pill .strategy-logo {
  width: 12px;
  height: 12px;
  object-fit: contain;
}
.strategy-pill .strategy-glyph {
  width: 12px;
  text-align: center;
  font-weight: 800;
  line-height: 1;
}
.strategy-pill.tone-upgrade { border-color: #16a34a; color: #166534; background: color-mix(in srgb, #16a34a 15%, var(--panel) 85%); }
.strategy-pill.tone-minor { border-color: #d97706; color: #92400e; background: color-mix(in srgb, #f59e0b 18%, var(--panel) 82%); }
.strategy-pill.tone-major { border-color: #dc2626; color: #991b1b; background: color-mix(in srgb, #ef4444 18%, var(--panel) 82%); }
.strategy-pill.tone-bpa { border-color: var(--primary); color: color-mix(in srgb, var(--primary) 85%, var(--ink) 15%); background: color-mix(in srgb, var(--primary-soft) 78%, var(--panel) 22%); }
.strategy-pill.tone-risk { border-color: #7c2d12; color: #7c2d12; background: color-mix(in srgb, #f97316 18%, var(--panel) 82%); }
.strategy-pill.tone-neutral { border-color: var(--line); color: var(--ink); background: var(--chip); }
.chip-clear {
  border-color: var(--warn);
  color: var(--warn);
  background: color-mix(in srgb, var(--panel) 70%, var(--warn) 30%);
  font-weight: 700;
}
.table-wrap { overflow: auto; max-height: 65vh; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th, td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
th {
  position: sticky;
  top: 0;
  background: var(--panel);
  cursor: pointer;
  z-index: 2;
}
tr:hover td { background: color-mix(in srgb, var(--chip) 38%, transparent); }
tr.sel td { background: var(--primary-soft); }
.badge {
  display: inline-block;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 10px;
  border: 1px solid var(--line);
}
.badge.kev { color: var(--kev); border-color: var(--kev); }
.badge.kev-fire { color: var(--kev); border-color: var(--kev); font-weight: 700; }
.badge.dir { color: var(--good); border-color: var(--good); }
.badge.tra { color: var(--warn); border-color: var(--warn); }
.badge.prio-red { color: #fff; border-color: #991b1b; background: #b91c1c; }
.badge.prio-orange { color: #111827; border-color: #b45309; background: #f59e0b; }
.badge.prio-yellow { color: #111827; border-color: #ca8a04; background: #fde047; }
.badge.prio-green { color: #064e3b; border-color: #047857; background: #6ee7b7; }
.badge.prio-gray { color: #111827; border-color: #6b7280; background: #d1d5db; }
#detail { padding: 12px; overflow: auto; max-height: calc(100vh - 120px); }
#detail > h3 {
  position: sticky;
  top: -12px;
  z-index: 8;
  margin: -12px -12px 10px -12px !important;
  padding: 10px 12px;
  background: color-mix(in srgb, var(--panel) 94%, var(--chip) 6%);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 2px 0 color-mix(in srgb, var(--line) 60%, transparent);
}
.kv { display: grid; grid-template-columns: 120px 1fr; gap: 6px; font-size: 12px; margin: 10px 0; }
.kv .k { color: var(--muted); }
.impact { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin: 10px 0; }
.impact button { text-align: left; }
.impact button.active { border-color: var(--primary); background: var(--primary-soft); }
.list { margin: 0; padding-left: 18px; }
.small { font-size: 11px; color: var(--muted); }
.toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  align-items: center;
  flex-wrap: wrap;
}
.cart-pane {
  position: fixed;
  top: 0;
  right: -460px;
  width: 460px;
  max-width: 100vw;
  height: 100vh;
  background: var(--panel);
  border-left: 1px solid var(--line);
  box-shadow: -4px 0 24px rgba(0,0,0,0.15);
  transition: right .2s ease;
  z-index: 40;
  display: flex;
  flex-direction: column;
}
.cart-pane.open { right: 0; }
.cart-head { padding: 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.cart-body { padding: 12px; overflow: auto; display: grid; gap: 10px; }
.cart-foot {
  border-top: 1px solid var(--line);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  background: var(--panel);
}
.cart-foot .h-row { gap: 8px; justify-content: space-between; }
.cart-foot-docs {
  width: 100%;
  text-align: right;
  font-size: 11px;
}
.cart-item {
  position: relative;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 8px 8px 8px;
}
.cart-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 22px;
  height: 22px;
  border-radius: 999px;
  padding: 0;
  line-height: 1;
  font-size: 14px;
  font-weight: 700;
}
.notice {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px;
  background: color-mix(in srgb, var(--primary-soft) 58%, var(--panel) 42%);
}
.notice h4 {
  margin: 0 0 6px 0;
  font-size: 12px;
}
.notice p {
  margin: 0 0 6px 0;
  font-size: 11px;
  color: var(--ink);
}
.notice ul {
  margin: 6px 0 0 16px;
  padding: 0;
  font-size: 11px;
}
textarea { width: 100%; min-height: 180px; border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: var(--panel); color: var(--ink); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; z-index: 50; }
.modal.open { display: grid; place-items: center; }
.modal-card { width: min(920px,95vw); height: 75vh; max-height: 90vh; overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; }
#modalText { flex: 1; min-height: 0; }
.doc-card { width: min(980px,96vw); height: 75vh; max-height: 90vh; }
.help-tabs {
  display: flex;
  gap: 8px;
  margin: 0 0 8px 0;
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--panel);
  padding: 2px 0 8px 0;
}
.help-tab {
  padding: 6px 10px;
}
.help-tab.active {
  background: var(--primary-soft);
  color: var(--ink);
  border-color: var(--primary);
}
.doc-content {
  flex: 1;
  min-height: 0;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
  background: color-mix(in srgb, var(--panel) 90%, var(--chip) 10%);
  font-size: 13px;
  line-height: 1.45;
}
.doc-content h1, .doc-content h2, .doc-content h3 { margin: 10px 0 8px 0; }
.doc-content p { margin: 8px 0; }
.doc-content ul, .doc-content ol { margin: 8px 0 8px 18px; padding: 0; }
.doc-content pre {
  margin: 8px 0;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: color-mix(in srgb, var(--panel) 72%, var(--chip) 28%);
  overflow: auto;
  font-size: 12px;
}
.doc-content code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
}
.version-modal-card {
  width: min(1120px, 97vw);
  height: 80vh;
  max-height: 92vh;
}
.library-modal-card {
  width: min(1080px, 97vw);
  height: 80vh;
  max-height: 92vh;
}
.library-modal-body {
  flex: 1;
  min-height: 0;
  overflow: auto;
}
.version-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.version-summary {
  margin: 8px 0;
  font-size: 12px;
}
.effort-visual {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px;
  margin: 8px 0;
  background: color-mix(in srgb, var(--panel) 85%, var(--chip) 15%);
}
.stack {
  width: 100%;
  height: 12px;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--line);
  display: flex;
}
.seg { height: 100%; }
.seg.patch { background: #16a34a; }
.seg.minor { background: #f59e0b; }
.seg.major { background: #ef4444; }
.seg.dead { background: #7c3aed; }
.seg.bp { background: #b91c1c; }
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
  font-size: 11px;
}
.legend .dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  display: inline-block;
  margin-right: 4px;
}
#detail a { color: var(--link); font-weight: 600; text-decoration-color: var(--link); }
#detail a:visited { color: var(--link-visited); }
a { color: var(--link); text-decoration-color: var(--link); }
a:visited { color: var(--link-visited); }
a:hover { text-decoration-thickness: 2px; }
button.cve-link {
  background: none;
  border: none;
  color: var(--link);
  text-decoration: underline;
  text-decoration-color: var(--link);
  padding: 0;
  font-size: 12px;
  font-weight: 600;
  border-radius: 0;
}
button.cve-link:hover { text-decoration-thickness: 2px; }
.mini-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.mini-table th, .mini-table td { border: 1px solid var(--line); padding: 5px 7px; white-space: nowrap; }
.vc-block {
  border: 1px solid var(--line);
  border-radius: 10px;
  margin: 6px 0;
  overflow: hidden;
}
.vc-block summary {
  cursor: pointer;
  padding: 6px 8px;
  font-size: 11px;
  color: var(--muted);
  background: color-mix(in srgb, var(--panel) 82%, var(--chip) 18%);
}
.vc-block .mini-table {
  margin: 0;
}
.project-head {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.ns-pill {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid var(--primary);
  color: var(--primary);
  background: color-mix(in srgb, var(--primary-soft) 70%, var(--panel) 30%);
}
.project-ref {
  font-weight: 700;
}
.libs-table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 10px;
}
.libs-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.libs-table th, .libs-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
  text-align: left;
}
.rich-line { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.tone { color: var(--muted); font-size: 11px; }
.sep { color: var(--muted); }
.ns-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 6px;
  font-size: 10px;
  color: var(--muted);
  background: color-mix(in srgb, var(--chip) 62%, var(--panel) 38%);
}
.ns-icons { display: inline-flex; align-items: center; gap: 2px; }
.ns-icon-img {
  width: 13px;
  height: 13px;
  object-fit: contain;
  vertical-align: middle;
}
.lib-title { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ns-badge-label {
  font-size: 10px;
  color: var(--muted);
  margin-left: 4px;
}
.ns-filter-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.kev-alert {
  margin: 8px 0;
  padding: 8px 10px;

# How To Use Risk Navigator

Risk Navigator helps teams prioritize dependency-risk remediation across projects using CVE, KEV, EPSS, impact radius, and upgrade effort.

## 1. Choose a Dataset

- **OSERA Demo Data (Example)** is a demo dataset.

## 2. Read The Ten Modes

1. **Libraries**: vulnerable library inventory and upgrade path.
2. **Top fixes**: ranked action list (UPGRADE_*, BACKPATCH_PROBABLE/BACKPATCH_LIKELY, CREATE_PATCH, AMPLIFIER, FRAMEWORK).
3. **Backpatch Priority Calculator**: scored patch/fork recommendations, priority colors, and ROI.
4. **Backpatch landscape**: dedicated backpatch opportunity view with qualification, consumer split, and remediation edge impact.
5. **Amplifiers**: high-leverage parent dependencies.
6. **Frameworks**: coordinated family-level upgrade opportunities.
7. **Dead-ends**: no clean GA-safe path; backpatch may be required.
8. **Projects**: consumer-project impact view.
9. **CVE list**: portfolio-wide CVE rollup with direct/transitive/library/project hit counts.
10. **Project CVE Remediation Plan**: project-level queue, action counts, and strategy labels.

## 3. OpenRewrite Cart

- The cart currently targets **Maven direct dependencies**.
- Add items from library details with **Add Maven lib to cart**.
- Use **Generate OpenRewrite YAML** to create recipes.
- Use **Impact prompt** to generate an analysis prompt for model-assisted migration planning.
- More OpenRewrite docs: [docs.openrewrite.org](https://docs.openrewrite.org)

## 4. Simulate backport patch (Libraries detail)

- The simulation assumes a safe backport/fork patch can be produced on the current release line.
- It estimates:
  - CVEs and KEV findings that would be addressed for that library version.
  - Direct and transitive consumer projects that would benefit.
  - How many projects could avoid a larger immediate upgrade motion (for example MINOR/MAJOR) if a backpatch is available first.
- In dead-end details, the tool also checks the latest release in the current minor line to identify "patch/dead-end" scenarios.
- This is a planning signal, not proof of patch feasibility. Engineering validation is still required.

## 5. Interpreting Recommendations

- UPGRADE_PATCH: safest upgrade motion.
- UPGRADE_MINOR: moderate compatibility risk.
- UPGRADE_MAJOR: highest migration complexity.
- BACKPATCH_PROBABLE: no safe PATCH or MINOR jump exists; backpatch path is primary.
- BACKPATCH_LIKELY: no safe PATCH jump exists, but safe MINOR jump exists; investigate tradeoffs.
- CREATE_PATCH: latest observed release is still vulnerable; create/maintain downstream patch.
- AMPLIFIER and FRAMEWORK: coordinated actions that reduce repeated work.

- Rebuild datasets via local scripts in scripts/.
- Release-date enrichment comes from deps.dev package version history.

# Glossary

## Core terms

- **CVE (Common Vulnerabilities and Exposures)**: standard identifier for a publicly disclosed security issue (for example \`CVE-2024-22259\`).
- **CVSS**: severity score (0.0-10.0) indicating technical impact.
- **KEV (Known Exploited Vulnerabilities)**: CISA catalog of CVEs with evidence of active exploitation.
- **EPSS**: probability model estimating likelihood of exploitation in the near term.

## Dependency context

- **Direct dependency**: library explicitly declared by a project.
- **Transitive dependency**: library pulled indirectly by another dependency.
- **Amplifier library**: direct parent dependency that pulls vulnerable transitive libraries into many projects.
- **Framework action**: coordinated upgrade across a shared ecosystem family (for example Spring-related components).

## Remediation terms

- **UPGRADE_PATCH**: move to safer patch release (lowest migration risk).
- **UPGRADE_MINOR**: move to safer minor release (moderate migration risk).
- **UPGRADE_MAJOR**: move to safer major release (highest migration effort).
- **DEAD_END**: no straightforward safe path visible in current snapshot.
- **CREATE_PATCH**: latest observed release is still vulnerable; downstream patch may be required.
- **Backpatch**: backporting security fixes onto an older dependency line used by consumers.

## Why backpatch matters

- It can reduce urgent migration pressure when only disruptive upgrade paths are available.
- It can provide a near-term safer path for many projects at once.
- It is most useful when upstream patch timing or support horizon is not sufficient for your risk window.

## When to explore backpatches

- No safe PATCH path exists and nearest safe path is MINOR/MAJOR with high compatibility cost.
- A dependency line appears abandoned but still widely consumed in your portfolio.
- Exposure is high (especially KEV-linked CVEs) and many projects would benefit from a shared patch.
- Amplifier/transitive patterns suggest one shared patch can eliminate repeated per-project workaround effort.

## Data sources (current build pipeline)

- **OSV all.zip (primary vulnerability catalog)**: CVE/package-version mappings plus advisory metadata. Docs: [osv.dev/docs](https://osv.dev/docs/) and [download guidance](https://osv.dev/docs/#download-vulnerability-data).
- **CISA KEV feed**: known-exploited vulnerability signal. Feed/docs: [CISA KEV catalog](https://www.cisa.gov/known-exploited-vulnerabilities-catalog) and [JSON feed](https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json).
- **FIRST EPSS API**: exploit-probability enrichment for CVEs. Docs: [FIRST EPSS API](https://www.first.org/epss/api).
- **deps.dev API**: version-history and release timestamp enrichment. Docs: [deps.dev API](https://docs.deps.dev/api/).
- **Optional local CVE metadata overlay** (\`data/external/cve_metadata.json\`): local corrections/supplemental narrative fields.

## Org data acquisition approach

- Project and dependency inventory is produced by extraction scripts into scope CSVs under \`data/raw/<scope>/\`.
- For the FINOS org dataset, extraction walks repository manifests/SBOM-like dependency declarations and derives:
  - consumer project records,
  - direct/transitive dependency edges,
  - package-version exposure rows.
- The dataset builder then joins org inventory with vulnerability/enrichment sources and emits \`data/<scope>.json\`.
- Company overlays should replace extractor inputs/connectors but preserve the output schema contract in SPEC section 4.1.
`;

function buildHeuristicsHelpMarkdown() {
  const w = PATCH_SCORE_WEIGHTS;

    "## 9. Heuristics (Dynamic)",
    "",
    "This section is generated from the same runtime criteria used by the scoring engine and action resolver.",
    "",
    "### Patch candidate score weights",
    `- remediation difficulty: ${pct(w.remediation_difficulty)}`,

    `- project overlap: ${pct(w.project_overlap)}`,

    `- security severity: ${pct(w.security_severity)}`,
    `- transitive amplifier impact: ${pct(w.transitive_amplifier_impact)}`,
    `- upstream health/support signal: ${pct(w.upstream_health_signal)}`,
    "",
    "### Priority bands",
    `- Immediate candidate: score >= ${b.immediate}`,
    `- Investigate next-wave: score >= ${b.investigate}`,

    `- Routine upgrade: score < ${b.guidance}`,
    "",
    "### Action policy thresholds",
    `- low runtime risk cutoff: CVSS < ${t.low_risk_cvss_max}`,
    `- monitor-only (PATCH class) cutoff: CVSS < ${t.monitor_patch_cvss_max}`,
    `- severe threshold: CVSS >= ${t.severe_cvss_min} or KEV-listed`,
    `- amplifier concentration threshold: transitive share >= ${t.amplifier_transitive_share_min.toFixed(2)}`,

    "### Policy intent",
    "- major-only safe paths default to OSERA patch ownership (create/maintain patch or amplifier patch path).",
    "- minor-only safe paths remain conditional and may stay on upgrade guidance when risk is manageable."
  ];
  return lines.join("\n");
}

  filterCompactSummary: $("#filterCompactSummary"),
  paneSplitter: $("#paneSplitter"),
  mainLayout: $("#mainLayout")
};

function toAscii(text) {
  return text
    .replace(/[\u2014\u2013]/g, "--")
    .replace(/[\u2018\u2019]/g, "'")
    .replace(/[\u201c\u201d]/g, '"')
    .replace(/\u2026/g, "...")
    .replace(/\u00a0/g, " ")
    .replace(/\u2192/g, "->")
    .replace(/[\u200b-\u200d\ufeff]/g, "")
    .replace(/[^\x09\x0A\x0D\x20-\x7E]/g, "?");
}

function slugify(s) {
  return (s || "scope").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "scope";
}

function fmt(n, digits = 2) {
  if (n === null || n === undefined || Number.isNaN(Number(n))) return "-";
  return Number(n).toFixed(digits);
}

function kevSearchUrl(cveId) {
  const cve = String(cveId || "").trim();
  if (!cve) return KEV_CATALOG_BASE;
  return `${KEV_CATALOG_BASE}?field_date_added_wrapper=all&items_per_page=20&search_api_fulltext=${encodeURIComponent(cve)}&sort_by=field_date_added`;
}

function parseLibraryId(id) {
  const [namespace = "", meta = "", proj = "", release = ""] = String(id || "").split("|");
  return { namespace, meta, proj, release };
}

function parseReleaseDateAny(obj) {
  if (!obj || typeof obj !== "object") return null;
  const keys = ["release_date", "released_at", "published", "date", "release_published_at"];
  for (const k of keys) {
    if (obj[k]) return String(obj[k]);
  }
  return null;
}

function parseReleaseDateSourceAny(obj) {
  if (!obj || typeof obj !== "object") return "";
  return String(obj.release_date_source || obj.release_source || "").trim();
}

function formatReleaseAge(dateStr) {
  if (!dateStr) return "unknown";
  const dt = new Date(dateStr);
  if (Number.isNaN(dt.getTime())) return "unknown";
  const now = new Date();
  const diffMs = now.getTime() - dt.getTime();
  if (diffMs < 0) return "future-dated";
  const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (days < 31) return `${days}d old`;
  const months = Math.floor(days / 30.44);
  if (months < 24) return `${months}mo old`;
  const years = (months / 12).toFixed(1).replace(/\.0$/, "");
  return `${years}y old`;
}

function releaseAgeMonths(dateStr) {
  if (!dateStr) return null;
  const dt = new Date(dateStr);
  if (Number.isNaN(dt.getTime())) return null;
  const now = new Date();
  const diffMs = now.getTime() - dt.getTime();
  if (diffMs < 0) return 0;
  return Math.floor(diffMs / (1000 * 60 * 60 * 24 * 30.44));
}

function deviconUrl(name, variant = "original") {
  return `${DEVICON_BASE}/${name}/${name}-${variant}.svg`;
}

function namespaceMeta(nsRaw, metaRaw = "") {
  const ns = String(nsRaw || "").toLowerCase();
  const meta = String(metaRaw || "").toLowerCase();
  const reg = state.namespaceRegistry || NS_REGISTRY_BASE;
  let resolved = reg[ns];
  const patterns = resolved && Array.isArray(resolved.meta_patterns) ? resolved.meta_patterns : [];
  if (resolved && patterns.length) {
    for (const pat of patterns) {
      if (!pat || typeof pat !== "object") continue;
      const contains = String(pat.contains || "").toLowerCase();
      const startsWith = String(pat.starts_with || "").toLowerCase();
      const equals = String(pat.equals || "").toLowerCase();
      const regex = String(pat.regex || "").trim();
      const containsMatch = contains ? meta.includes(contains) : true;
      const startsWithMatch = startsWith ? meta.startsWith(startsWith) : true;
      const equalsMatch = equals ? meta === equals : true;
      let regexMatch = true;
      if (regex) {
        try {
          regexMatch = new RegExp(regex, "i").test(meta);
        } catch {
          regexMatch = false;
        }
      }
      if (containsMatch && startsWithMatch && equalsMatch && regexMatch) {
        resolved = {
          label: String(pat.label || resolved.label || ns || "unknown"),
          icons: Array.isArray(pat.icons) ? pat.icons : (Array.isArray(resolved.icons) ? resolved.icons : [])
        };
        break;
      }
    }
  }
  if (!resolved && ns.startsWith("debian")) {
    resolved = { label: ns, icons: [{ name: "debian" }] };
  }
  if (!resolved && ns === "internal-pkg" && meta.includes("java")) {
    resolved = { label: "internal-pkg/java", icons: [{ name: "maven" }] };
  }
  if (!resolved && ns === "internal-pkg" && (meta.includes("js") || meta.includes("node"))) {
    resolved = { label: "internal-pkg/js", icons: [{ name: "npm" }] };
  }
  if (!resolved) return { label: ns || "unknown", icons: [] };
  return {
    label: String(resolved.label || ns || "unknown"),
    icons: Array.isArray(resolved.icons) ? resolved.icons : []
  };
}

function renderNamespaceBadge(nsRaw, showText = false, metaRaw = "") {
  const m = namespaceMeta(nsRaw, metaRaw);
  const iconsHtml = (m.icons || [])
    .map(icon => {
      const srcOverride = String(icon.srcOverride || "").trim();
      const src = srcOverride || deviconUrl(icon.name, icon.variant || "original");
      return `<img class="ns-icon-img" src="${src}" alt="${icon.name}" loading="lazy" decoding="async">`;
    })
    .join("");
  return `<span class="ns-badge" title="${m.label}" aria-label="${m.label}"><span class="ns-icons">${iconsHtml || ""}</span>${showText ? `<span class="ns-badge-label">${m.label}</span>` : ""}</span>`;
}

function renderLibraryRef(meta, proj, release, namespace = "") {
  const parts = [];
  if (namespace) {
    parts.push(renderNamespaceBadge(namespace, false, meta));
  }
  if (meta) {
    parts.push(`<span class="chip">${meta}</span>`);
    if (proj) parts.push(`<span class="sep">/</span>`);
  }
  if (proj) {
    parts.push(`<span class="chip">${proj}</span>`);
  }
  if (release) {
    parts.push(`<span class="sep">@</span><span class="chip">${release}</span>`);
  }
  return `<span class="lib-title">${parts.join("")}</span>`;
}

function renderLibraryIdRich(id) {
  const p = parseLibraryId(id);
  return `<div class="rich-line">${p.namespace ? `<span class="tone">${p.namespace}</span>` : ""}${renderLibraryRef(p.meta, p.proj, p.release, p.namespace)}</div>`;
}

function renderLibraryCell(lib) {
  return renderLibraryRef(lib.meta, lib.proj, "", lib.namespace);
}

function renderFrameworkLabel(frameworkRow) {
  const id = String(frameworkRow.id || "").toLowerCase();
  const label = frameworkRow.label || frameworkRow.id || "Framework";
  const firstNs = (frameworkRow.libs && frameworkRow.libs.length) ? frameworkRow.libs[0].namespace : "";
  if (id === "spring-boot" || id === "spring-framework") {
    return `<span class="lib-title"><span class="ns-badge"><span class="ns-icons"><img class="ns-icon-img" src="${deviconUrl("spring")}" alt="spring" loading="lazy" decoding="async"></span><span>spring</span></span><span>${label}</span></span>`;
  }
  if (id === "netty" || id === "jackson") {
    return `<span class="lib-title">${renderNamespaceBadge(firstNs)}<span>${label}</span></span>`;
  }
  if (id === "rhel-base") {
    return `<span class="lib-title">${renderNamespaceBadge("rpm")}<span>${label}</span></span>`;
  }
  return `<span class="lib-title">${renderNamespaceBadge(firstNs)}<span>${label}</span></span>`;
}

function normalizeAmplifierLabel(label, namespace) {
  const raw = String(label || "").trim();
  const ns = String(namespace || "").toLowerCase();
  if (!raw) return "-";
  const slashTrim = ns ? raw.replace(new RegExp(`^${ns}[/:]`, "i"), "") : raw;
  return slashTrim.replace(/^\//, "");
}

function renderAmplifierLabel(label, namespace) {
  const clean = normalizeAmplifierLabel(label, namespace);
  return `<span class="lib-title">${renderNamespaceBadge(namespace)}<span>${clean}</span></span>`;
}

function renderTopFixTarget(row) {
  if (row.action_type === "FRAMEWORK" && row.detail) {
    return renderFrameworkLabel(row.detail);
  }
  if (row.action_type === "AMPLIFIER" && row.detail && row.detail.visible_libraries && row.detail.visible_libraries.length) {
    const firstLib = parseLibraryId(row.detail.visible_libraries[0]);
    return renderAmplifierLabel(row.target, firstLib.namespace);
  }
  if (row.detail && row.detail.id) {
    const lib = row.detail;
    return renderLibraryRef(lib.meta, lib.proj, lib.release, lib.namespace);
  }
  return row.target;
}

function compareMajorMinor(a, b) {
  const pa = parseMajorMinor(a);
  const pb = parseMajorMinor(b);
  if (!pa || !pb) return 0;
  const ma = Number(pa.major), mb = Number(pb.major);
  if (ma !== mb) return ma - mb;
  const na = Number(pa.minor), nb = Number(pb.minor);
  return na - nb;
}

function buildBackpatchAssessment(lib) {
  const currentRelease = String(lib && lib.release || "");
  const chain = (lib && lib.version_chain) || [];
  const latestInChain = chain.length ? chain[chain.length - 1] : null;
  const latestRelease = latestInChain ? String(latestInChain.release || "") : currentRelease;
  const latestCveCount = latestInChain ? Number(latestInChain.cve_count || 0) : Number(lib && lib.cve_count || 0);
  const latestIsSafe = latestInChain ? !!latestInChain.is_safe : false;
  const latestVulnerable = latestCveCount > 0 || !latestIsSafe;
  const isCurrentLatest = !!currentRelease && !!latestRelease && currentRelease === latestRelease;
  // Guard against bad upstream rollups that populate "max_safe_patch_same_minor"
  // with a version from a different major/minor line.
  const hasSafePatch = (() => {
    const candidate = String(lib && lib.max_safe_patch_same_minor || "").trim();
    if (!candidate) return false;
    const curMM = parseMajorMinor(currentRelease);
    const candMM = parseMajorMinor(candidate);
    if (!curMM || !candMM) return false;
    if (String(curMM.major) !== String(candMM.major)) return false;
    if (String(curMM.minor) !== String(candMM.minor)) return false;
    return true;
  })();
  const hasSafeUpgrade = !!(lib && lib.nearest_safe_version);
  const latestSameMinor = findLatestSameMinor(lib || {});
  const nearestSafe = String(lib && lib.nearest_safe_version || "");
  const currentMM = parseMajorMinor(currentRelease);
  const safeChain = chain.filter(v => !!v.is_safe);
  const hasSafeMinorPath = safeChain.some(v => {
    const mm = parseMajorMinor(v.release);
    if (!mm || !currentMM) return false;
    return Number(mm.major) === Number(currentMM.major) && Number(mm.minor) > Number(currentMM.minor);
  });
  const hasSafeMajorPath = safeChain.some(v => {
    const mm = parseMajorMinor(v.release);
    if (!mm || !currentMM) return false;
    return Number(mm.major) > Number(currentMM.major);
  });
  const releaseDateCurrent = parseReleaseDateAny((chain || []).find(v => v.release === currentRelease));
  const releaseDateLatest = parseReleaseDateAny(latestInChain || {});
  const releaseDateCurrentSource = parseReleaseDateSourceAny((chain || []).find(v => v.release === currentRelease));
  const releaseDateLatestSource = parseReleaseDateSourceAny(latestInChain || {});

  // Create patch: current version is the newest observed version and remains vulnerable.
  const createPatch = isCurrentLatest && latestVulnerable;

  let qualification = "UNSURE";
  if (!createPatch) {
    if (!hasSafePatch && hasSafeMinorPath) qualification = "LIKELY";
    if (!hasSafePatch && !hasSafeMinorPath) qualification = "PROBABLE";
  }

  let remediationType = "NONE";
  let remediationAction = "";
  if (createPatch) {
    remediationType = "CREATE_PATCH";
    remediationAction = "CREATE_PATCH";
  } else if (!hasSafePatch && (hasSafeUpgrade || hasSafeMajorPath || ["MINOR", "MAJOR", "DEAD_END"].includes(String(lib && lib.effort_class || "")))) {
    remediationType = "BACKPATCH";
    remediationAction = qualification === "PROBABLE" ? "BACKPATCH_PROBABLE" : "BACKPATCH_LIKELY";
  }

  let rationale = "No backpatch or create-patch recommendation from current snapshot.";
  if (createPatch) {
    rationale = `Current release ${currentRelease || "-"} appears to be the latest observed version and is still vulnerable (${latestCveCount} CVE(s)); this is a create-patch case rather than a backport.`;
  } else if (qualification === "LIKELY") {
    const jump = nearestSafe ? ` (${currentRelease} -> ${nearestSafe})` : "";
    rationale = `No safe PATCH path exists, but a safe MINOR path exists${jump}; backpatch is likely useful to reduce immediate migration disruption.`;
  } else if (qualification === "PROBABLE") {
    rationale = `No safe PATCH or MINOR path is visible in this snapshot; remediation is major-only or no safe upgrade path, so backpatch is probable.`;
  }

  const directConsumers = Number(lib && lib.direct_consumer_count || 0);
  const transitiveConsumers = Number(lib && lib.transitive_consumer_count || 0);
  const cveCount = Number(lib && lib.cve_count || 0);
  const edgeDirect = directConsumers * cveCount;
  const edgeTransitive = transitiveConsumers * cveCount;
  const edgeTotal = edgeDirect + edgeTransitive;
  const safePathKind = hasSafeMinorPath ? "minor" : (hasSafeMajorPath ? "major-only" : (!nearestSafe ? "none" : "unknown"));
  const currentAge = formatReleaseAge(releaseDateCurrent);
  const latestAge = formatReleaseAge(releaseDateLatest);
  const currentAgeMonths = releaseAgeMonths(releaseDateCurrent);
  const latestAgeMonths = releaseAgeMonths(releaseDateLatest);
  let maintenanceSignal = "No age signal available from dataset.";
  if (latestAgeMonths !== null) {
    if (latestVulnerable && latestAgeMonths >= 18) maintenanceSignal = `Latest observed vulnerable release is ~${latestAgeMonths} months old; community fix momentum may be low and local patch ownership may be required.`;
    else if (latestVulnerable) maintenanceSignal = `Latest observed vulnerable release is recent (~${latestAgeMonths} months old); check upstream issue trackers/releases for pending security fixes.`;
    else maintenanceSignal = `Latest observed release age is ~${latestAgeMonths} months; safe path appears present in snapshot.`;
  }

  return {
    remediation_type: remediationType,
    remediation_action: remediationAction,
    qualification,
    rationale,
    has_safe_patch: hasSafePatch,
    has_safe_upgrade: hasSafeUpgrade,
    has_safe_minor_path: hasSafeMinorPath,
    has_safe_major_path: hasSafeMajorPath,
    safe_path_kind: safePathKind,
    nearest_safe_version: nearestSafe || "-",
    latest_release: latestRelease || "-",
    latest_cve_count: latestCveCount,
    latest_vulnerable: latestVulnerable,
    is_current_latest: isCurrentLatest,
    latest_same_minor: latestSameMinor,
    direct_consumers: directConsumers,
    transitive_consumers: transitiveConsumers,
    edge_vulns_direct: edgeDirect,
    edge_vulns_transitive: edgeTransitive,
    edge_vulns_total: edgeTotal,
    current_release_age: currentAge,
    latest_release_age: latestAge,
    current_release_age_source: releaseDateCurrentSource || "unknown",
    latest_release_age_source: releaseDateLatestSource || "unknown",
    current_release_age_months: currentAgeMonths,
    latest_release_age_months: latestAgeMonths,
    maintenance_signal: maintenanceSignal
  };
}

function clamp01(n) {
  const x = Number(n);
  if (Number.isNaN(x)) return 0;
  return Math.max(0, Math.min(1, x));
}

function ageBucketFromMonths(months) {
  if (months === null || months === undefined || Number.isNaN(Number(months))) return "Unknown";
  const m = Number(months);
  if (m < 6) return "Fresh";
  if (m < 18) return "Aging";
  if (m < 36) return "Old";
  if (m < 72) return "Very Old";
  return "Ancient/EOL";
}

function ageBucketScore(bucket) {
  if (bucket === "Fresh") return 0.15;
  if (bucket === "Aging") return 0.35;
  if (bucket === "Old") return 0.6;
  if (bucket === "Very Old") return 0.85;
  if (bucket === "Ancient/EOL") return 1.0;
  return 0.5;
}

function effortConcernScore(effort) {
  if (effort === "PATCH") return 0.2;
  if (effort === "MINOR") return 0.55;
  if (effort === "MAJOR") return 0.85;
  if (effort === "DEAD_END") return 1.0;
  return 0.65;
}

function priorityBand(score, hasEnoughData = true) {
  if (!hasEnoughData) return { label: "Insufficient data", css: "prio-gray" };
  if (score >= PRIORITY_BAND_THRESHOLDS.immediate) return { label: "Immediate candidate", css: "prio-red" };
  if (score >= PRIORITY_BAND_THRESHOLDS.investigate) return { label: "Investigate next-wave", css: "prio-orange" };
  if (score >= PRIORITY_BAND_THRESHOLDS.guidance) return { label: "Standard guidance", css: "prio-yellow" };
  return { label: "Routine upgrade", css: "prio-green" };
}

function resolveRecommendedAction(lib, assessment, componentScores) {
  const eff = String(lib.effort_class || "UNKNOWN");
  const cvss = Number(lib.max_cvss || 0);
  const kev = Number(lib.kev_cve_count || 0);
  const direct = Number(lib.direct_consumer_count || 0);
  const transitive = Number(lib.transitive_consumer_count || 0);
  const total = Math.max(1, Number(lib.total_consumer_count || 0));
  const transitiveShare = transitive / total;
  const hasAmplifier = !!(lib.top_amplifier && lib.top_amplifier.meta && lib.top_amplifier.proj);
  const ageMonths = assessment.current_release_age_months;
  const oldLine = ageMonths !== null && ageMonths >= 36;
  const severe = cvss >= ACTION_POLICY_THRESHOLDS.severe_cvss_min || kev > 0;
  const majorOnlyPath = String(assessment && assessment.safe_path_kind || "") === "major-only" || eff === "MAJOR";

  if (cvss < ACTION_POLICY_THRESHOLDS.low_risk_cvss_max && kev === 0) return "EXCLUDE_LOW_RUNTIME_RISK";
  if (eff === "PATCH" && kev === 0 && cvss < ACTION_POLICY_THRESHOLDS.monitor_patch_cvss_max) return "MONITOR_ONLY";
  if (assessment.remediation_type === "CREATE_PATCH") return oldLine ? "PATCH_EXISTING_FORK" : "CREATE_LIBRARY_FORK";

  // Policy: major-jump-only remediation should default to OSERA patch ownership.
  if (assessment.remediation_type === "BACKPATCH" && majorOnlyPath) {
    if (hasAmplifier && transitiveShare >= ACTION_POLICY_THRESHOLDS.amplifier_transitive_share_min) return "PATCH_AMPLIFIER_LIBRARY";
    return oldLine ? "PATCH_EXISTING_FORK" : "CREATE_LIBRARY_FORK";
  }

  // Minor-jump paths are conditional: backpatch only when urgency/concentration warrants it.
  if (assessment.remediation_type === "BACKPATCH" && hasAmplifier && transitiveShare >= ACTION_POLICY_THRESHOLDS.amplifier_transitive_share_min) return "PATCH_AMPLIFIER_LIBRARY";
  if (assessment.remediation_type === "BACKPATCH" && (eff === "DEAD_END" || (severe && kev > 0))) return oldLine ? "PATCH_EXISTING_FORK" : "CREATE_LIBRARY_FORK";
  if (eff !== "PATCH" && transitive > direct && !hasAmplifier) return "CREATE_BOM_OVERRIDE";
  if (eff === "PATCH" && severe) return "PUBLISH_UPGRADE_GUIDANCE";
  if (
    componentScores.enterprise_upgrade_risk < ACTION_POLICY_THRESHOLDS.wait_enterprise_upgrade_risk_max &&
    componentScores.security_severity < ACTION_POLICY_THRESHOLDS.wait_security_severity_max
  ) return "WAIT_FOR_UPSTREAM";
  return "PUBLISH_UPGRADE_GUIDANCE";
}

function recommendedActionExplanation(action) {
  const map = {
    CREATE_LIBRARY_FORK: "No low-friction safe path is available; OSERA-maintained fork/backpatch is likely required.",
    PATCH_EXISTING_FORK: "A maintained backpatch line is implied; prioritize patch refresh on the existing fork line.",
    PATCH_AMPLIFIER_LIBRARY: "Transitive exposure dominates; patching the introducing amplifier yields simpler direct upgrades for consumers.",
    CREATE_BOM_OVERRIDE: "Temporary managed-version override can reduce immediate risk while broader migration or patching is prepared.",
    PUBLISH_UPGRADE_GUIDANCE: "Standard migration guidance plus tested upgrade path is likely sufficient for consumers.",
    WAIT_FOR_UPSTREAM: "Current risk/effort profile suggests waiting for upstream while monitoring may be acceptable.",
    MONITOR_ONLY: "Low-severity and lower urgency profile; continue monitoring and include in routine cycles.",
    EXCLUDE_LOW_RUNTIME_RISK: "Low-impact signal in current runtime context; deprioritize unless new exploit signals emerge."
  };
  return map[action] || "Needs analyst validation.";
}

function alliancePatchReason(lib, assessment, action) {
  const a = String(action || "");
  if (!["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY"].includes(a)) return "";
  if (a === "PATCH_AMPLIFIER_LIBRARY") {
    const amp = (lib && lib.top_amplifier && lib.top_amplifier.meta && lib.top_amplifier.proj)
      ? `${lib.top_amplifier.meta}/${lib.top_amplifier.proj}@${lib.top_amplifier.release || "-"}`
      : "top amplifier path";
    return `Transitive risk concentration suggests patching amplifier ${amp} to provide a single safer direct-upgrade path.`;
  }
  if (assessment && assessment.remediation_type === "CREATE_PATCH") {
    return `Latest observed release (${lib.release || "-"}) is still vulnerable; OSERA-maintained patch on current line is required.`;
  }
  if (assessment && assessment.safe_path_kind === "major-only") {
    return `Only major-version safe path is visible; OSERA backpatch on ${versionLineFamily(lib.release)} can defer immediate major migration.`;
  }
  if (String(lib && lib.effort_class || "") === "DEAD_END") {
    return `Dead-end remediation profile with no low-friction safe path in scope; OSERA patch ownership is recommended.`;
  }
  return `OSERA-maintained patch/fork recommended due to upgrade-risk and availability profile in this snapshot.`;
}

function computeLibraryPriorityProfile(lib, maxProjects = 1) {
  const assessment = buildBackpatchAssessment(lib);
  const totalProjects = Number(lib.total_consumer_count || 0);
  const transitive = Number(lib.transitive_consumer_count || 0);
  const direct = Number(lib.direct_consumer_count || 0);
  const cveCount = Number(lib.cve_count || 0);
  const maxCvss = Number(lib.max_cvss || 0);
  const kevCount = Number(lib.kev_cve_count || 0);
  const epssMax = Number(lib.epss_max || 0);
  const hasAmplifier = !!(lib.top_amplifier && lib.top_amplifier.meta && lib.top_amplifier.proj);
  const ageBucket = ageBucketFromMonths(assessment.current_release_age_months);
  const remediationDifficulty = effortConcernScore(lib.effort_class);
  const versionBranchAge = ageBucketScore(ageBucket);
  const projectOverlap = clamp01(totalProjects / Math.max(1, maxProjects));
  const enterpriseUpgradeRisk = clamp01((remediationDifficulty * 0.6) + ((transitive > direct ? 0.25 : 0.1)) + ((assessment.safe_path_kind === "major-only" || lib.effort_class === "MAJOR") ? 0.25 : 0));
  const securitySeverity = clamp01((maxCvss / 10) * 0.75 + (kevCount > 0 ? 0.25 : 0));
  const transitiveAmplifierImpact = clamp01(((totalProjects ? transitive / totalProjects : 0) * 0.7) + (hasAmplifier ? 0.3 : 0));
  const upstreamHealthSignal = assessment.current_release_age_months === null ? 0.5 : clamp01(assessment.current_release_age_months / 60);

  const componentScores = {
    remediation_difficulty: remediationDifficulty,
    version_branch_age: versionBranchAge,
    project_overlap: projectOverlap,
    enterprise_upgrade_risk: enterpriseUpgradeRisk,
    security_severity: securitySeverity,
    transitive_amplifier_impact: transitiveAmplifierImpact,
    upstream_health_signal: upstreamHealthSignal
  };

  const score01 = Object.entries(PATCH_SCORE_WEIGHTS).reduce((sum, [key, weight]) => {
    return sum + (Number(componentScores[key] || 0) * Number(weight || 0));
  }, 0);
  const patchCandidateScore = Math.round(clamp01(score01) * 1000) / 10;

  const recommendedAction = resolveRecommendedAction(lib, assessment, componentScores);
  const severityReduction = clamp01((maxCvss / 10) * (kevCount > 0 ? 1.15 : 1.0));
  const remediationSimplification = clamp01(1 - (effortConcernScore(lib.effort_class) * 0.5) + (hasAmplifier ? 0.35 : 0.15));
  const transitiveReduction = clamp01((totalProjects ? transitive / totalProjects : 0) + (hasAmplifier ? 0.25 : 0));
  const patchRoi = Math.round((totalProjects * severityReduction * remediationSimplification * transitiveReduction) * 100) / 100;
  const directTransitiveIndicator = transitive > 0 && direct > 0 ? "Mixed" : transitive > 0 ? "Transitive-only" : "Direct-only";
  const isBackpatchCandidate = ["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY", "CREATE_BOM_OVERRIDE"].includes(recommendedAction);
  const alliancePatchRequired = ["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY"].includes(recommendedAction);
  const alliancePatchReasonText = alliancePatchReason(lib, assessment, recommendedAction);
  const amplifierLabel = hasAmplifier
    ? `${lib.top_amplifier.namespace || "unknown"}/${lib.top_amplifier.meta || ""}/${lib.top_amplifier.proj || ""}@${lib.top_amplifier.release || ""}`.replace(/\/@/, "/")
    : (transitive > 0 ? "Needs dependency-edge data" : "-");
  const hasEnoughData = assessment.current_release_age_months !== null || lib.effort_class !== "UNKNOWN";
  const band = priorityBand(patchCandidateScore, hasEnoughData);

  return {
    assessment,
    latest_version: assessment.latest_release || "-",
    age_bucket: ageBucket,
    component_scores: componentScores,
    patch_candidate_score: patchCandidateScore,
    recommended_action: recommendedAction,
    recommended_action_explanation: recommendedActionExplanation(recommendedAction),
    alliance_patch_required: alliancePatchRequired,
    alliance_patch_required_score: alliancePatchRequired ? 1 : 0,
    alliance_patch_reason: alliancePatchReasonText,
    patch_roi: patchRoi,
    severity_reduction: severityReduction,
    remediation_simplification: remediationSimplification,
    transitive_reduction: transitiveReduction,
    direct_transitive_indicator: directTransitiveIndicator,
    amplifier_library: amplifierLabel,
    priority_band: band.label,
    priority_css: band.css,
    is_backpatch_candidate: isBackpatchCandidate
  };
}

  }

  if (parsed.namespace || parsed.meta || parsed.proj) {

}

function projectGroupMode() {
  const mode = String(((state.dataset || {}).meta || {}).project_group_mode || "").toLowerCase();
  return mode === "department" ? "department" : "heuristic";
}

function tokenizeProjectForGroup(project) {
  const ref = String(project?.project_ref || "").replace(/^github\//i, "");
  const raw = `${ref} ${project?.proj || ""} ${project?.meta || ""}`.toLowerCase();
  return raw
    .split(/[^a-z0-9]+/)
    .map(t => t.trim())
    .filter(t => t.length >= 4 && !GROUP_TOKEN_STOPWORDS.has(t));
}

function computeProjectGroups(dataset) {
  const projects = (dataset && dataset.consumer_projects) || [];
  const mode = projectGroupMode();
  const groups = new Map();

  if (mode === "department") {
    for (const p of projects) {
      groups.set(p.id, (p.department || "Unmapped"));
    }
    return groups;
  }

  const tokenCounts = new Map();
  for (const p of projects) {
    const uniq = new Set(tokenizeProjectForGroup(p));
    uniq.forEach(tok => tokenCounts.set(tok, (tokenCounts.get(tok) || 0) + 1));
  }

  const viable = new Set([...tokenCounts.entries()].filter(([, count]) => count >= 2).map(([tok]) => tok));
  for (const p of projects) {
    const tokens = tokenizeProjectForGroup(p).filter(tok => viable.has(tok));
    const best = tokens.sort((a, b) => (tokenCounts.get(b) - tokenCounts.get(a)) || a.localeCompare(b))[0];
    groups.set(p.id, best ? best.replace(/^\w/, c => c.toUpperCase()) : "General");
  }
  return groups;
}

function inlineMarkdown(text) {
  return escapeHtml(text)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
}

function markdownToHtml(md) {
  const lines = String(md || "").replace(/\r\n/g, "\n").split("\n");
  const out = [];
  let inUl = false;
  let inOl = false;
  let inCode = false;

  const closeLists = () => {
    if (inUl) { out.push("</ul>"); inUl = false; }
    if (inOl) { out.push("</ol>"); inOl = false; }
  };

  for (const lineRaw of lines) {
    const line = lineRaw || "";
    const t = line.trim();
    if (t.startsWith("```")) {
      closeLists();
      if (!inCode) {
        out.push("<pre><code>");
        inCode = true;
      } else {
        out.push("</code></pre>");
        inCode = false;
      }
      continue;
    }
    if (inCode) {
      out.push(`${escapeHtml(line)}\n`);
      continue;
    }
    if (!t) {
      closeLists();
      continue;
    }
    if (/^###\s+/.test(t)) {
      closeLists();
      out.push(`<h3>${inlineMarkdown(t.replace(/^###\s+/, ""))}</h3>`);
      continue;
    }
    if (/^##\s+/.test(t)) {
      closeLists();
      out.push(`<h2>${inlineMarkdown(t.replace(/^##\s+/, ""))}</h2>`);
      continue;
    }
    if (/^#\s+/.test(t)) {
      closeLists();
      out.push(`<h1>${inlineMarkdown(t.replace(/^#\s+/, ""))}</h1>`);
      continue;
    }
    if (/^-\s+/.test(t)) {
      if (!inUl) { closeLists(); out.push("<ul>"); inUl = true; }
      out.push(`<li>${inlineMarkdown(t.replace(/^-\s+/, ""))}</li>`);
      continue;
    }
    if (/^\d+\.\s+/.test(t)) {
      if (!inOl) { closeLists(); out.push("<ol>"); inOl = true; }
      out.push(`<li>${inlineMarkdown(t.replace(/^\d+\.\s+/, ""))}</li>`);
      continue;
    }
    closeLists();
    out.push(`<p>${inlineMarkdown(t)}</p>`);
  }
  closeLists();
  if (inCode) out.push("</code></pre>");
  return out.join("\n");
}

function buildVersionExplorerRows(lib) {
  const rows = (lib.version_chain || []).map(v => ({ ...v }));

  const consumedByRelease = new Map();
  packageLibs.forEach(pl => {

    consumedByRelease.set(rel, {
      projects: Number(pl.total_consumer_count || 0),
      direct: Number(pl.direct_consumer_count || 0),
      transitive: Number(pl.transitive_consumer_count || 0)
    });
  });
  return rows.map((v, idx) => {
    const rel = String(v.release || "");
    const consumed = consumedByRelease.get(rel);
    const dateRaw = parseReleaseDateAny(v);
    return {
      idx,
      release: rel,
      is_safe: !!v.is_safe,
      cve_count: Number(v.cve_count || 0),
      max_cvss: Number(v.max_cvss || 0),
      release_id: Number(v.release_id || idx),
      age: formatReleaseAge(dateRaw),
      age_months: releaseAgeMonths(dateRaw),
      consumed: !!consumed,
      consumed_projects: consumed ? Number(consumed.projects || 0) : 0,
      consumed_direct: consumed ? Number(consumed.direct || 0) : 0,
      consumed_transitive: consumed ? Number(consumed.transitive || 0) : 0
    };
  });
}

function selectLatestByLine(rows, mode) {
  const byLine = new Map();
  rows.forEach(row => {
    const mm = parseMajorMinor(row.release);
    if (!mm) return;
    const key = mode === "latest-major" ? `${mm.major}` : `${mm.major}.${mm.minor}`;
    byLine.set(key, row);
  });
  const latestRows = new Set([...byLine.values()].map(r => r.release));
  return rows.filter(row => latestRows.has(row.release) || row.consumed);
}

function collapseVersionRows(rows) {
  const out = [];
  let run = [];

  const flushRun = () => {
    if (!run.length) return;
    if (run.length >= 3) {
      const first = run[0];
      const last = run[run.length - 1];
      out.push({
        type: "range",
        release_label: `${first.release} .. ${last.release}`,
        count: run.length,
        is_safe: first.is_safe,
        cve_count: Math.max(...run.map(x => x.cve_count || 0)),
        max_cvss: Math.max(...run.map(x => x.max_cvss || 0)),
        age: `${first.age} -> ${last.age}`,
        consumed: false,
        consumed_projects: 0,
        notes: `Collapsed ${run.length} adjacent ${first.is_safe ? "safe" : "vulnerable"} releases`
      });
    } else {
      run.forEach(r => out.push({ ...r, type: "single", release_label: r.release, notes: "" }));
    }
    run = [];
  };

  rows.forEach(row => {
    if (row.consumed) {
      flushRun();
      out.push({ ...row, type: "single", release_label: row.release, notes: "Consumed by projects" });
      return;
    }
    if (!run.length) {
      run.push(row);
      return;
    }
    const last = run[run.length - 1];
    if (last.is_safe === row.is_safe && !last.consumed && !row.consumed) {
      run.push(row);
    } else {
      flushRun();
      run.push(row);
    }
  });
  flushRun();
  return out;
}

function renderVersionExplorer() {
  const lib = getLibraryById(state.versionExplorer.libId);
  if (!lib) return;
  const assessment = buildBackpatchAssessment(lib);
  const allRows = buildVersionExplorerRows(lib);
  let rows = allRows.slice();
  const mode = state.versionExplorer.viewMode;
  if (mode === "consumed") {
    rows = rows.filter(r => r.consumed);
  } else if (mode === "latest-minor" || mode === "latest-major") {
    rows = selectLatestByLine(rows, mode);
  }
  if (!state.versionExplorer.showSafe) {
    rows = rows.filter(r => !r.is_safe || r.consumed);
  }
  const displayed = state.versionExplorer.collapseRuns ? collapseVersionRows(rows) : rows.map(r => ({ ...r, type: "single", release_label: r.release, notes: r.consumed ? "Consumed by projects" : "" }));

  els.versionModalTitle.textContent = `Version Explorer: ${lib.meta}:${lib.proj}`;

  const body = displayed.map(r => {

    const consumed = r.consumed ? `<span class="badge tra">yes</span>` : "-";

    return `<tr>

function closeLibraryModal() {

function applyDetailWidth(px) {
  const n = Math.round(Math.max(320, Math.min(760, Number(px) || 420)) / 10) * 10;
  document.documentElement.style.setProperty("--detail-width", `${n}px`);
  localStorage.setItem("risk-nav-detail-width", String(n));
}

function initPaneSplitter() {
  const splitter = els.paneSplitter;
  const main = els.mainLayout;
  if (!splitter || !main) return;

  const onPointerMove = e => {
    if (window.matchMedia("(max-width: 1024px)").matches) return;
    const rect = main.getBoundingClientRect();
    const width = rect.right - e.clientX;
    applyDetailWidth(width);
  };

  const stopDrag = () => {
    document.removeEventListener("pointermove", onPointerMove);
    document.removeEventListener("pointerup", stopDrag);
    document.body.style.userSelect = "";
    document.body.style.cursor = "";
  };

  splitter.addEventListener("pointerdown", e => {
    if (window.matchMedia("(max-width: 1024px)").matches) return;
    e.preventDefault();
    document.body.style.userSelect = "none";
    document.body.style.cursor = "col-resize";
    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", stopDrag);
  });

  splitter.addEventListener("dblclick", () => applyDetailWidth(420));
}

function loadTheme() {
  const stored = localStorage.getItem("risk-nav-theme");
  const theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
  updateThemeButton(theme);
}

function updateThemeButton(theme = document.documentElement.getAttribute("data-theme")) {
  const current = theme === "dark" ? "dark" : "light";
  if (els.themeIcon) els.themeIcon.textContent = current === "dark" ? "☀" : "☾";
  if (els.themeBtn) {
    const label = current === "dark" ? "Switch to light theme" : "Switch to dark theme";
    els.themeBtn.setAttribute("aria-label", label);
    els.themeBtn.setAttribute("title", label);
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("risk-nav-theme", next);
  updateThemeButton(next);
}

function buildNamespaceRegistryFromMeta(meta) {
  const out = { ...NS_REGISTRY_BASE };
  const incoming = meta && typeof meta === "object" ? meta.namespace_icons : null;
  if (!incoming || typeof incoming !== "object") return out;
  for (const [key, row] of Object.entries(incoming)) {
    if (!row || typeof row !== "object") continue;
    const k = String(key || "").toLowerCase().trim();
    if (!k) continue;
    out[k] = {
      label: String(row.label || k),
      icons: Array.isArray(row.icons) ? row.icons.map(icon => ({
        name: String((icon && icon.name) || "").trim(),
        variant: String((icon && icon.variant) || "original").trim(),
        srcOverride: String((icon && icon.srcOverride) || "").trim()
      })).filter(icon => icon.name || icon.srcOverride) : [],
      meta_patterns: Array.isArray(row.meta_patterns) ? row.meta_patterns.map(p => ({
        contains: String((p && p.contains) || "").trim(),
        starts_with: String((p && p.starts_with) || "").trim(),
        equals: String((p && p.equals) || "").trim(),
        regex: String((p && p.regex) || "").trim(),
        label: String((p && p.label) || "").trim(),
        icons: Array.isArray(p && p.icons) ? p.icons.map(icon => ({
          name: String((icon && icon.name) || "").trim(),
          variant: String((icon && icon.variant) || "original").trim(),
          srcOverride: String((icon && icon.srcOverride) || "").trim()
        })).filter(icon => icon.name || icon.srcOverride) : []
      })) : []
    };
  }
  return out;
}

function buildFrameworkRule(row) {
  if (!row || typeof row !== "object") return null;
  const id = String(row.id || "").trim();
  const label = String(row.label || id || "").trim();
  if (!id || !label) return null;
  const ns = String(row.namespace || "").trim().toLowerCase();
  const metaPrefix = String(row.meta_prefix || "").trim().toLowerCase();
  const projPrefix = String(row.proj_prefix || "").trim().toLowerCase();
  return {
    id,
    label,
    match: lib => {
      const libNs = String(lib && lib.namespace || "").toLowerCase();
      const libMeta = String(lib && lib.meta || "").toLowerCase();
      const libProj = String(lib && lib.proj || "").toLowerCase();
      if (ns && libNs !== ns) return false;
      if (metaPrefix && !libMeta.startsWith(metaPrefix)) return false;
      if (projPrefix && !libProj.startsWith(projPrefix)) return false;
      return true;
    }
  };
}

function buildFrameworkRulesFromMeta(meta) {
  const base = FRAMEWORKS.slice();
  const incoming = meta && typeof meta === "object" ? meta.frameworks_overlay : null;
  if (!Array.isArray(incoming)) return base;
  for (const row of incoming) {
    const rule = buildFrameworkRule(row);
    if (rule) base.push(rule);
  }
  return base;
}

function applyMetaPresentation(meta) {
  const m = (meta && typeof meta === "object") ? meta : {};

  const scopeType = String(m.scope_type || "").trim();
  const scopeName = String(m.scope_name || "scope").trim();
  const scopeLabel = String(m.scope_label || "").trim() || scopeName;
  const division = String(m.division_short || m.division || "").trim();
  const scopeDisplay = division ? `${division} / ${scopeLabel}` : scopeLabel;

  const c = (state.dataset && state.dataset.meta && state.dataset.meta.counts) || {};
  const uniqueCveCount = (() => {
    const fromMeta = Number(c.unique_cves || c.unique_cve_count || 0);
    if (fromMeta > 0) return fromMeta;
    const seen = new Set();
    (state.dataset?.libraries || []).forEach(lib => {
      (lib.cves || []).forEach(cve => {
        const id = String(cve?.cve_id || "").trim();
        if (id) seen.add(id);
      });
    });
    return seen.size;
  })();
  const grouping = projectGroupMode() === "department" ? "Org-mapped groups" : "Heuristic groups";
  const scopeTypeLabel = scopeType || "department";
  els.scopeMeta.innerHTML = `
    <div class="meta-pills">
      <span class="meta-pill">${scopeDisplay}</span>
      <span class="meta-pill">${scopeTypeLabel}</span>
      <span class="meta-pill">${c.consumer_projects || 0} projects</span>
      <span class="meta-pill">${uniqueCveCount} unique CVEs</span>
      <span class="meta-pill">${c.distinct_cve_libraries || 0} vulnerable libraries</span>
      <span class="meta-pill">Grouping: ${grouping}</span>
    </div>
  `;

  const labels = m.filter_labels && typeof m.filter_labels === "object" ? m.filter_labels : {};
  if (els.labelProjectGroup) els.labelProjectGroup.textContent = String(labels.project_group || "Project Group");
  if (els.labelProjectReference) els.labelProjectReference.textContent = String(labels.project_reference || "Project Reference");

  state.frameworkRules = buildFrameworkRulesFromMeta(m);
  state.namespaceRegistry = buildNamespaceRegistryFromMeta(m);
}

async function hydrateMetaOverlays(meta) {
  const m = (meta && typeof meta === "object") ? meta : {};
  const overlayUrl = String(m.frameworks_overlay_url || "").trim();
  if (!overlayUrl) return m;
  try {
    const res = await fetch(overlayUrl);
    if (!res.ok) return m;
    const payload = await res.json();
    const rows = Array.isArray(payload) ? payload : (Array.isArray(payload.frameworks_overlay) ? payload.frameworks_overlay : []);
    if (rows.length) {
      m.frameworks_overlay = Array.isArray(m.frameworks_overlay) ? m.frameworks_overlay.concat(rows) : rows;
    }
  } catch {
    // Keep base behavior when overlay fetch fails.
  }
  return m;
}

async function fetchManifest() {
  const queryManifest = new URLSearchParams(location.search).get("manifest");
  const candidates = queryManifest
    ? [queryManifest]
    : ["manifest.json", "tool/manifest.json"];
  let lastErr = null;
  for (const url of candidates) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`manifest fetch failed (${res.status})`);
      return await res.json();
    } catch (err) {
      lastErr = err;
    }
  }
  throw lastErr || new Error("manifest fetch failed");
}

async function fetchDataset(url) {
  if (state.cache.has(url)) return state.cache.get(url);
  const res = await fetch(url);
  if (!res.ok) throw new Error("dataset fetch failed");
  const data = await res.json();
  state.cache.set(url, data);
  return data;
}

function cartKey() {
  const scope = (state.dataset && state.dataset.meta && state.dataset.meta.scope_name) || "scope";
  return `risk-nav-cart:${slugify(scope)}`;
}

function loadCart() {
  try {
    const raw = localStorage.getItem(cartKey());
    state.cart = raw ? JSON.parse(raw) : [];
    state.cart = (Array.isArray(state.cart) ? state.cart : []).map(item => ({
      ...item,
      useMaxPatch: !!item.useMaxPatch,
      manualNewVersion: String(item.manualNewVersion || item.newVersion || ""),
      newVersion: String(item.newVersion || "")
    }));
  } catch {
    state.cart = [];
  }
  renderCart();
}

function saveCart() {
  localStorage.setItem(cartKey(), JSON.stringify(state.cart));
  renderCart();
}

function addToCart(lib) {
  if (lib.namespace !== "maven") {
    alert("Cart is Maven-only in this version.");
    return;
  }
  const key = `${lib.meta}:${lib.proj}`;
  if (state.cart.find(x => x.key === key)) return;
  const fromRange = deriveFromRange(lib.release, lib.distance_to_safe);
  state.cart.push({
    key,
    groupId: lib.meta,
    artifactId: lib.proj,
    currentVersion: lib.release,
    fromRange,
    newVersion: lib.nearest_safe_version || lib.release,
    manualNewVersion: lib.nearest_safe_version || lib.release,
    useMaxPatch: false,
    maxSafePatch: lib.max_safe_patch_same_minor || lib.nearest_safe_version || lib.release,
    effort: lib.effort_class,
    directConsumers: lib.direct_consumer_count,
    transitiveConsumers: lib.transitive_consumer_count,
    cveCount: lib.cve_count,
    kevCount: lib.kev_cve_count || 0
  });
  saveCart();
}

function deriveFromRange(release, effort) {
  const parts = String(release || "").split(".").map(x => parseInt(x, 10));
  if (parts.some(Number.isNaN)) return release;
  if (effort === "PATCH") return `${parts[0]}.${parts[1]}.x`;
  if (effort === "MINOR") return `${parts[0]}.x`;
  return release;
}

function removeCartItem(key) {
  state.cart = state.cart.filter(item => item.key !== key);
  saveCart();
}

function generateYaml() {
  if (!state.cart.length) return "# Cart is empty\n";
  const scopeSlug = slugify(state.dataset.meta.scope_name || "scope");
  const ns = `com.example.risk-navigator.UpgradeBundle.${scopeSlug}`;
  const docs = [];
  for (const item of state.cart) {
    const subName = `${ns}.${item.groupId.replace(/[^a-zA-Z0-9._-]/g, "_")}__${item.artifactId.replace(/[^a-zA-Z0-9._-]/g, "_")}`;
    const warn = item.directConsumers === 0 ? "WARNING: no direct consumers in scope; mostly transitive impact." : "";
    docs.push(`---\ntype: specs.openrewrite.org/v1beta/recipe\nname: ${subName}\ndisplayName: Upgrade ${item.groupId}:${item.artifactId} if ${item.fromRange} is present\ndescription: |\n  Conditional upgrade. Source scope: ${item.directConsumers} direct consumer(s), ${item.transitiveConsumers} transitive. ${warn}\npreconditions:\n  - org.openrewrite.java.dependencies.FindDependency:\n      groupId: ${yamlScalar(item.groupId)}\n      artifactId: ${yamlScalar(item.artifactId)}\n      version: ${yamlScalar(item.fromRange)}\nrecipeList:\n  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:\n      groupId: ${yamlScalar(item.groupId)}\n      artifactId: ${yamlScalar(item.artifactId)}\n      newVersion: ${yamlScalar(item.newVersion)}`);
  }
  docs.push(`---\ntype: specs.openrewrite.org/v1beta/recipe\nname: ${ns}\ndisplayName: Upgrade vulnerable Maven/Gradle dependencies -- ${state.dataset.meta.scope_name}\ndescription: |\n  Generated by Risk Navigator. Cart contains ${state.cart.length} libraries.\nrecipeList:\n${state.cart.map(item => `  - ${ns}.${item.groupId.replace(/[^a-zA-Z0-9._-]/g, "_")}__${item.artifactId.replace(/[^a-zA-Z0-9._-]/g, "_")}`).join("\n")}`);
  return toAscii(docs.join("\n\n"));
}

function yamlScalar(val) {
  const s = String(val || "");
  return /^[A-Za-z0-9._:+-]+$/.test(s) ? s : `"${s.replace(/"/g, "\\\"")}"`;
}

function generateImpactPrompt() {
  if (!state.cart.length) return "Cart is empty.";
  const lines = [];
  lines.push(`You are helping plan dependency upgrades for scope: ${state.dataset.meta.scope_name}.`);
  lines.push("For each library, identify deprecated, removed, or renamed APIs between FROM and TO versions.");
  lines.push("Return a second OpenRewrite YAML recipe using search recipes: org.openrewrite.java.search.FindDeprecatedUses, org.openrewrite.analysis.search.FindMethods, org.openrewrite.java.search.FindFields, org.openrewrite.java.search.FindTypes.");
  lines.push("Group findings by library and focus on minor/major jumps. If version knowledge is uncertain, ask for release-note URLs.");
  lines.push("\nUpgrade items:");
  state.cart.forEach((item, idx) => {
    const risk = item.effort === "PATCH" ? "patch only - low risk" : item.effort === "MINOR" ? "minor version jump - moderate risk" : "MAJOR VERSION JUMP - high risk";
    lines.push(`${idx + 1}. ${item.groupId}:${item.artifactId} ${item.fromRange} -> ${item.newVersion} (${risk})`);
  });
  return toAscii(lines.join("\n"));
}

function upgradeRiskLabel(effortClass) {
  if (effortClass === "PATCH") return "low";
  if (effortClass === "MINOR") return "moderate";
  if (effortClass === "MAJOR") return "high";
  return "unknown";
}

function summarizeVersionChain(lib, maxRows = 14) {
  const chain = (lib && lib.version_chain) || [];
  if (!chain.length) return "- no version-chain data provided";
  return chain.slice(0, maxRows).map(v => {
    const safe = v.is_safe ? "safe" : "vulnerable";
    return `- ${v.release} | CVSS ${fmt(v.max_cvss, 1)} | CVEs ${v.cve_count} | ${safe}`;
  }).join("\n");
}

function parseMajorMinor(release) {
  const m = String(release || "").match(/^(\d+)\.(\d+)/);
  if (!m) return null;
  return { major: m[1], minor: m[2] };
}

function versionLineFamily(release) {
  const mm = parseMajorMinor(release);
  if (!mm) return String(release || "-");
  return `${mm.major}.${mm.minor}.x`;
}

function isAlliancePatchAction(action) {
  const a = String(action || "");
  return ["CREATE_LIBRARY_FORK", "PATCH_EXISTING_FORK", "PATCH_AMPLIFIER_LIBRARY"].includes(a);
}

function findLatestSameMinor(lib) {
  const mm = parseMajorMinor(lib && lib.release);
  if (!mm) return null;
  const chain = (lib && lib.version_chain) || [];
  const inMinor = chain.filter(v => {
    const vmm = parseMajorMinor(v.release);
    return vmm && vmm.major === mm.major && vmm.minor === mm.minor;
  });
  if (!inMinor.length) return null;
  const latest = inMinor[inMinor.length - 1];
  const libId = `${lib.namespace}|${lib.meta}|${lib.proj}|${latest.release}`;
  const known = (state.dataset.libraries || []).find(x => x.id === libId);
  return {
    release: latest.release,
    cve_count: Number(latest.cve_count || 0),
    max_cvss: Number(latest.max_cvss || 0),
    is_safe: !!latest.is_safe,
    cves: (known && known.cves) ? known.cves : [],
    kev_cve_count: known ? Number(known.kev_cve_count || 0) : 0
  };
}

function generateTopFixUpgradePrompt(lib, actionType) {
  if (!lib) return "No library context available.";
  const scope = (state.dataset && state.dataset.meta && state.dataset.meta.scope_name) || "scope";
  const toVersion = lib.nearest_safe_version || lib.max_safe_patch_same_minor || lib.release;

    .filter(p => (lib.consumer_project_ids || []).includes(p.id))
    .slice(0, 60)
    .map(p => renderProjectRef(p)));
  const lines = [];
  lines.push(`You are planning ${actionType} for dependency ${lib.meta}:${lib.proj} in scope ${scope}.`);
  lines.push(`Current version: ${lib.release}`);
  lines.push(`Target safe version candidate: ${toVersion}`);
  lines.push(`Upgrade class: ${lib.effort_class} (${severity} migration risk)`);
  lines.push(`Exposure: ${lib.cve_count} CVEs, ${lib.kev_cve_count || 0} KEV, ${lib.total_consumer_count} impacted projects (${lib.direct_consumer_count} direct / ${lib.transitive_consumer_count} transitive).`);
  lines.push("");
  lines.push("Version chain context:");
  lines.push(summarizeVersionChain(lib, 18));
  lines.push("");
  lines.push("Required output:");
  lines.push("1. Upgrade rationale and expected uplift (CVE risk reduction, compatibility risk, rollout scope).");
  lines.push("2. A concrete OpenRewrite YAML recipe set for dependency upgrade and compatibility scans.");
  lines.push("3. A key version delta summary: deprecated/removed methods, fields, types, package moves, behavior/config changes.");
  lines.push("4. Validation plan: compile/test gates, smoke tests, rollback signal.");

  lines.push("");
  lines.push("OpenRewrite requirements:");
  lines.push("- Use org.openrewrite.java.dependencies.UpgradeDependencyVersion for dependency upgrades.");
  lines.push("- Add search recipes for impact discovery: org.openrewrite.java.search.FindDeprecatedUses, org.openrewrite.analysis.search.FindMethods, org.openrewrite.java.search.FindFields, org.openrewrite.java.search.FindTypes.");

  if (actionType === "UPGRADE_MAJOR") {
    lines.push("");
    lines.push("Major-upgrade extra requirements:");
    lines.push("1. Look for existing OpenRewrite recipes (official/community) that target this library/framework version jump.");
    lines.push("2. Propose additional codemods/scripts when OpenRewrite is insufficient (for example jscodeshift, sed-based transforms, custom AST scripts).");
    lines.push("3. Include migration sequencing: prerequisite upgrades, intermediate versions, and branch strategy.");
    lines.push("4. Include non-code changes: config, runtime flags, build-plugin updates, container/image impacts.");
  } else {
    lines.push("");
    lines.push("Minor-upgrade focus:");
    lines.push("1. Prioritize binary/source compatibility checks and deprecation-driven remediations.");
    lines.push("2. Keep recipe set minimal and safe for batch rollout.");
  }

  lines.push("");
  lines.push("Impacted project references:");
  if (impactedRefs.length) {
    impactedRefs.forEach((ref, idx) => lines.push(`${idx + 1}. ${ref}`));
  } else {
    lines.push("- none in current filter");
  }
  lines.push("");
  lines.push("Return format:");
  lines.push("- Section A: concise findings");
  lines.push("- Section B: OpenRewrite YAML (ready to run)");
  lines.push("- Section C: optional codemods/scripts");
  lines.push("- Section D: execution and verification checklist");

  return toAscii(lines.join("\n"));
}

function backpatchConsiderations(assessment) {
  if (!assessment) return [];
  if (assessment.remediation_type === "CREATE_PATCH") {
    return [
      "This is the newest observed upstream release in the snapshot and is still vulnerable; there is no simple backport source line available.",
      "Validate whether upstream has unpublished fixes or open security patches before forking.",
      "Plan patch lifecycle ownership: branch, CVE triage, regression tests, and distribution channel."
    ];
  }
  if (assessment.qualification === "LIKELY") {
    return [
      "A safe minor jump exists, but may include dependency graph reshuffles and compatibility risk.",
      "Backpatch can reduce near-term migration churn while preserving the current consumer line.",
      "Assess support horizon and maintenance burden versus upgrading to the nearest safe version."
    ];
  }
  return [
    "No clean patch/minor path is visible in this snapshot; remediation likely requires custom patch ownership.",
    "Quantify long-term maintenance obligations if the organization becomes upstream-of-last-resort.",
    "Consider parallel tracks: immediate patching plus medium-term migration planning."
  ];
}

function generateBackpatchResearchPrompt(lib, assessment) {
  if (!lib || !assessment) return "No backpatch context available.";

    .filter(p => (lib.consumer_project_ids || []).includes(p.id))
    .slice(0, 80)
    .map(p => renderProjectRef(p)));

  const lines = [];
